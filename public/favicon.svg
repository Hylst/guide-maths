<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <defs>
    <linearGradient id='bgGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#0a0e1a;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#0f172a;stop-opacity:1' />
    </linearGradient>
    <linearGradient id='sigmaGrad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#fbbf24;stop-opacity:1' />
      <stop offset='50%' style='stop-color:#f59e0b;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#d97706;stop-opacity:1' />
    </linearGradient>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='2.5' result='coloredBlur'/>
      <feMerge>
        <feMergeNode in='coloredBlur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
    <filter id='glow2'>
      <feGaussianBlur stdDeviation='4' result='coloredBlur'/>
      <feMerge>
        <feMergeNode in='coloredBlur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width='100' height='100' rx='20' fill='url(#bgGrad)'/>

  <!-- Subtle border -->
  <rect width='100' height='100' rx='20' fill='none' stroke='#f59e0b' stroke-width='1.5' stroke-opacity='0.3'/>

  <!-- Glow halo behind sigma -->
  <path d='M28 22 H72 V34 L50 50 L72 66 V78 H28 V66 H56 L38 50 L56 34 H28 Z'
        fill='#f59e0b' opacity='0.15' filter='url(#glow2)'/>

  <!-- Sigma symbol with gold gradient and glow -->
  <path d='M28 22 H72 V34 L50 50 L72 66 V78 H28 V66 H56 L38 50 L56 34 H28 Z'
        fill='url(#sigmaGrad)' filter='url(#glow)'/>
</svg>
