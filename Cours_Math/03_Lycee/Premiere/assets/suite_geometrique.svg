<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); }
    .point { fill: #10b981; }
    .line { stroke: #10b981; stroke-width: 2; stroke-dasharray: 4; opacity: 0.5; }
    .jump { stroke: #ec4899; stroke-width: 2; fill: none; marker-end: url(#arrow-jump); animation: pulse 2s infinite; }
    .label { font-family: 'JetBrains Mono', monospace; font-size: 14px; fill: #334155; }
    @keyframes pulse { 0% { stroke-width: 2; } 50% { stroke-width: 4; } 100% { stroke-width: 2; } }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="arrow-jump" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ec4899"/></marker>
  </defs>
  <rect width="600" height="300" fill="#ffffff" />
  
  <!-- Axes -->
  <line x1="50" y1="250" x2="550" y2="250" class="axis"/>
  <text x="540" y="280" class="label">n</text>
  <line x1="100" y1="280" x2="100" y2="50" class="axis"/>
  <text x="60" y="60" class="label">v_n</text>
  
  <!-- Points for v_n = 1 * 2^n (Géométrique, q=2) -->
  <!-- n=0, v0=1 (y=240) -->
  <circle cx="100" cy="240" r="6" class="point"/>
  <text x="80" y="250" class="label">v0</text>
  
  <!-- n=1, v1=2 (y=220) -->
  <circle cx="200" cy="220" r="6" class="point"/>
  <line x1="200" y1="250" x2="200" y2="220" class="line"/>
  <text x="195" y="270" class="label">1</text>
  
  <!-- n=2, v2=4 (y=180) -->
  <circle cx="300" cy="180" r="6" class="point"/>
  <line x1="300" y1="250" x2="300" y2="180" class="line"/>
  <text x="295" y="270" class="label">2</text>
  
  <!-- n=3, v3=8 (y=100) -->
  <circle cx="400" cy="100" r="6" class="point"/>
  <line x1="400" y1="250" x2="400" y2="100" class="line"/>
  <text x="395" y="270" class="label">3</text>
  
  <!-- Jumps (*q) -->
  <path d="M 110 230 Q 150 210 190 215" class="jump"/>
  <text x="140" y="210" class="label" fill="#ec4899">× q</text>
  
  <path d="M 210 210 Q 250 180 290 175" class="jump"/>
  <text x="240" y="180" class="label" fill="#ec4899">× q</text>
  
  <path d="M 310 170 Q 350 120 390 95" class="jump"/>
  <text x="340" y="120" class="label" fill="#ec4899">× q</text>
  
  <text x="150" y="40" class="label" fill="#10b981" font-weight="bold">Suite Géométrique : v_{n+1} = v_n × q</text>
</svg>
