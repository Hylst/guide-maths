<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .grid { stroke: #f1f5f9; stroke-width: 1; }
    .axis { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); }
    .curve { stroke: #6366f1; stroke-width: 4; fill: none; }
    .secant { stroke: #f43f5e; stroke-width: 2; stroke-dasharray: 5; transform-origin: 200px 300px; animation: rotateSecant 4s ease-in-out infinite alternate; }
    .tangent { stroke: #10b981; stroke-width: 3; opacity: 0; animation: showTangent 4s ease-in-out infinite alternate; }
    .point { fill: #1e293b; }
    .label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; fill: #334155; }
    @keyframes rotateSecant { 0% { transform: rotate(-30deg); } 100% { transform: rotate(0deg); } }
    @keyframes showTangent { 0% { opacity: 0; } 80% { opacity: 0; } 100% { opacity: 1; } }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="600" height="400" fill="#ffffff" />
  <!-- Axes -->
  <line x1="50" y1="350" x2="550" y2="350" class="axis"/>
  <line x1="100" y1="380" x2="100" y2="50" class="axis"/>
  <!-- Curve (Parabola-like) -->
  <path d="M 100 350 Q 300 350 500 50" class="curve" />
  <!-- Tangent at A(200, 300) -->
  <line x1="50" y1="337.5" x2="450" y2="237.5" class="tangent" />
  <text x="460" y="230" class="label" fill="#10b981" style="animation: showTangent 4s ease-in-out infinite alternate;">Tangente (h=0)</text>
  <!-- Secant Line AB -->
  <line x1="50" y1="337.5" x2="550" y2="212.5" class="secant" />
  <text x="460" y="190" class="label" fill="#f43f5e">Sécante (h>0)</text>
  <!-- Points -->
  <circle cx="200" cy="300" r="5" class="point"/>
  <text x="180" y="320" class="label">A(a, f(a))</text>
</svg>
