<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .plane { fill: #3b82f6; opacity: 0.2; stroke: #2563eb; stroke-width: 2; }
    .vec-n { stroke: #ef4444; stroke-width: 4; fill: none; marker-end: url(#arrow-n); }
    .vec-am { stroke: #10b981; stroke-width: 3; fill: none; marker-end: url(#arrow-am); }
    .point { fill: #1e293b; }
    .label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; }
    .right-angle { stroke: #ef4444; stroke-width: 2; fill: none; }
  </style>
  <defs>
    <marker id="arrow-n" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
    <marker id="arrow-am" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker>
  </defs>
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Plane P -->
  <polygon points="100,250 400,250 500,150 200,150" class="plane" />
  <text x="450" y="180" class="label" fill="#2563eb">Plan P</text>
  
  <!-- Point A -->
  <circle cx="300" cy="200" r="5" class="point" />
  <text x="280" y="220" class="label">A</text>
  
  <!-- Normal Vector n -->
  <line x1="300" y1="200" x2="300" y2="80" class="vec-n" />
  <text x="310" y="120" class="label" fill="#ef4444">n (a, b, c)</text>
  
  <!-- Point M on the plane -->
  <circle cx="400" cy="220" r="5" class="point" />
  <text x="410" y="240" class="label">M(x, y, z)</text>
  
  <!-- Vector AM -->
  <line x1="300" y1="200" x2="400" y2="220" class="vec-am" />
  <text x="340" y="235" class="label" fill="#10b981">AM</text>
  
  <!-- Right angle symbol -->
  <polyline points="300,180 320,184 320,204" class="right-angle" />
  
  <text x="150" y="320" class="label">M ∈ P ⟺ AM · n = 0</text>
  <text x="150" y="350" class="label">a(x - xA) + b(y - yA) + c(z - zA) = 0</text>
</svg>
