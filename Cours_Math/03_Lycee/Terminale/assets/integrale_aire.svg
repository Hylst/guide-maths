<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); }
    .curve { stroke: #ec4899; stroke-width: 4; fill: none; }
    .area { fill: #ec4899; opacity: 0.3; animation: fillArea 3s ease-in-out infinite alternate; }
    .rect { fill: #3b82f6; opacity: 0.5; stroke: #2563eb; stroke-width: 1; animation: showRects 3s ease-in-out infinite alternate; }
    .label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; }
    
    @keyframes fillArea { 0%, 40% { opacity: 0; } 60%, 100% { opacity: 0.3; } }
    @keyframes showRects { 0%, 40% { opacity: 0.5; } 60%, 100% { opacity: 0; } }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Axes -->
  <line x1="50" y1="350" x2="550" y2="350" class="axis"/>
  <line x1="100" y1="380" x2="100" y2="50" class="axis"/>
  
  <!-- Curve f(x) -->
  <path d="M 100 300 Q 250 50 450 150" class="curve" />
  
  <!-- Exact Area -->
  <path d="M 150 350 L 150 230 Q 250 50 400 135 L 400 350 Z" class="area" />
  
  <!-- Rectangles (Riemann Sum) -->
  <rect x="150" y="230" width="50" height="120" class="rect" />
  <rect x="200" y="140" width="50" height="210" class="rect" />
  <rect x="250" y="90" width="50" height="260" class="rect" />
  <rect x="300" y="85" width="50" height="265" class="rect" />
  <rect x="350" y="105" width="50" height="245" class="rect" />
  
  <!-- Labels -->
  <text x="145" y="375" class="label">a</text>
  <text x="395" y="375" class="label">b</text>
  <text x="460" y="140" class="label" fill="#ec4899">y = f(x)</text>
  
  <text x="250" y="250" class="label" fill="#be185d" style="animation: fillArea 3s ease-in-out infinite alternate;">∫ f(x) dx</text>
</svg>
