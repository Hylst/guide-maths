<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); }
    .curve { stroke: #10b981; stroke-width: 4; fill: none; }
    .line-k { stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 5; animation: moveK 4s ease-in-out infinite alternate; }
    .point-alpha { fill: #f43f5e; animation: moveAlpha 4s ease-in-out infinite alternate; }
    .label { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: bold; }
    
    @keyframes moveK { 0% { transform: translateY(100px); } 100% { transform: translateY(-100px); } }
    @keyframes moveAlpha { 0% { transform: translate(-150px, 100px); } 100% { transform: translate(150px, -100px); } }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="600" height="400" fill="#ffffff" />
  
  <!-- Axes -->
  <line x1="50" y1="350" x2="550" y2="350" class="axis"/>
  <line x1="100" y1="380" x2="100" y2="50" class="axis"/>
  
  <!-- Curve (Strictly increasing straight line for easy CSS animation sync) -->
  <line x1="150" y1="300" x2="450" y2="100" class="curve" />
  
  <!-- Animated elements -->
  <g style="animation: moveK 4s ease-in-out infinite alternate;">
    <line x1="50" y1="200" x2="550" y2="200" class="line-k" />
    <text x="60" y="190" class="label" fill="#f59e0b">y = k</text>
  </g>
  
  <g style="animation: moveAlpha 4s ease-in-out infinite alternate;">
    <circle cx="300" cy="200" r="6" class="point-alpha" />
    <line x1="300" y1="200" x2="300" y2="350" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4" />
    <text x="295" y="370" class="label" fill="#f43f5e">α</text>
  </g>
  
  <text x="350" y="80" class="label" fill="#10b981">Fonction continue et strictement monotone</text>
  <text x="150" y="380" class="label">a</text>
  <text x="450" y="380" class="label">b</text>
</svg>
