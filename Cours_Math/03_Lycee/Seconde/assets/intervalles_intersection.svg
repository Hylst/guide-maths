<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line { stroke: #cbd5e1; stroke-width: 4; }
    .tick { stroke: #94a3b8; stroke-width: 2; }
    .label { font-family: 'Inter', sans-serif; font-size: 16px; fill: #475569; text-anchor: middle; }
    .interval-i { stroke: #3b82f6; stroke-width: 8; stroke-linecap: round; opacity: 0.7; }
    .interval-j { stroke: #ef4444; stroke-width: 8; stroke-linecap: round; opacity: 0.7; }
    .intersection { stroke: #8b5cf6; stroke-width: 12; stroke-linecap: round; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
  </style>
  <!-- Number line -->
  <line x1="50" y1="100" x2="750" y2="100" class="line" />
  <g class="ticks">
    <line x1="150" y1="90" x2="150" y2="110" class="tick"/><text x="150" y="130" class="label">-2</text>
    <line x1="350" y1="90" x2="350" y2="110" class="tick"/><text x="350" y="130" class="label">1</text>
    <line x1="450" y1="90" x2="450" y2="110" class="tick"/><text x="450" y="130" class="label">3</text>
    <line x1="650" y1="90" x2="650" y2="110" class="tick"/><text x="650" y="130" class="label">6</text>
  </g>
  <!-- Interval I: [-2, 3] -->
  <line x1="150" y1="70" x2="450" y2="70" class="interval-i" />
  <text x="300" y="60" class="label" fill="#3b82f6" font-weight="bold">I = [-2 ; 3]</text>
  <!-- Interval J: [1, 6] -->
  <line x1="350" y1="130" x2="650" y2="130" class="interval-j" />
  <text x="500" y="155" class="label" fill="#ef4444" font-weight="bold">J = [1 ; 6]</text>
  <!-- Intersection I n J: [1, 3] -->
  <line x1="350" y1="100" x2="450" y2="100" class="intersection" />
  <text x="400" y="90" class="label" fill="#8b5cf6" font-weight="bold">I ∩ J = [1 ; 3]</text>
</svg>
