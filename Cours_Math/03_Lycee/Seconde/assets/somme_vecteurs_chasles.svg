<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .vec-u { stroke: #3b82f6; stroke-width: 4; fill: none; marker-end: url(#arrow-u); }
    .vec-v { stroke: #ef4444; stroke-width: 4; fill: none; marker-end: url(#arrow-v); }
    .vec-w { stroke: #10b981; stroke-width: 6; fill: none; marker-end: url(#arrow-w); stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 3s forwards infinite; }
    .point { fill: #1e293b; }
    .label { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: bold; }
    @keyframes draw { 0% { stroke-dashoffset: 500; } 50% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
  </style>
  <defs>
    <marker id="arrow-u" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/></marker>
    <marker id="arrow-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
    <marker id="arrow-w" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker>
  </defs>
  <!-- Points -->
  <circle cx="100" cy="300" r="5" class="point"/><text x="80" y="320" class="label">A</text>
  <circle cx="300" cy="100" r="5" class="point"/><text x="300" y="80" class="label">B</text>
  <circle cx="500" cy="250" r="5" class="point"/><text x="510" y="270" class="label">C</text>
  <!-- Vectors -->
  <line x1="100" y1="300" x2="300" y2="100" class="vec-u" />
  <text x="180" y="190" class="label" fill="#3b82f6">u (AB)</text>
  <line x1="300" y1="100" x2="500" y2="250" class="vec-v" />
  <text x="420" y="160" class="label" fill="#ef4444">v (BC)</text>
  <!-- Sum Vector -->
  <line x1="100" y1="300" x2="500" y2="250" class="vec-w" />
  <text x="300" y="300" class="label" fill="#10b981">u + v = AC (Chasles)</text>
</svg>
