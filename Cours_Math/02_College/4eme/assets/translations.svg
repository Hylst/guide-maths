<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafafa" />
  
  <!-- Titre -->
  <text x="50%" y="40" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#1e3a8a" text-anchor="middle">La Translation (Glissement)</text>

  <!-- Grille de fond -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="0" y1="100" x2="600" y2="100" />
    <line x1="0" y1="150" x2="600" y2="150" />
    <line x1="0" y1="200" x2="600" y2="200" />
    <line x1="0" y1="250" x2="600" y2="250" />
    <line x1="0" y1="300" x2="600" y2="300" />
    <line x1="0" y1="350" x2="600" y2="350" />
    <line x1="100" y1="50" x2="100" y2="400" />
    <line x1="150" y1="50" x2="150" y2="400" />
    <line x1="200" y1="50" x2="200" y2="400" />
    <line x1="250" y1="50" x2="250" y2="400" />
    <line x1="300" y1="50" x2="300" y2="400" />
    <line x1="350" y1="50" x2="350" y2="400" />
    <line x1="400" y1="50" x2="400" y2="400" />
    <line x1="450" y1="50" x2="450" y2="400" />
    <line x1="500" y1="50" x2="500" y2="400" />
  </g>

  <!-- Vecteur de translation -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Triangle 1 (Original) -->
  <polygon points="150,250 250,250 200,150" fill="#dbeafe" stroke="#2563eb" stroke-width="3" />
  <text x="135" y="265" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a">A</text>
  <text x="255" y="265" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a">B</text>
  <text x="195" y="140" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a">C</text>

  <!-- Triangle 2 (Image) -->
  <polygon points="350,200 450,200 400,100" fill="#fce7f3" stroke="#db2777" stroke-width="3" />
  <text x="335" y="215" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#9d174d">A'</text>
  <text x="455" y="215" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#9d174d">B'</text>
  <text x="395" y="90" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#9d174d">C'</text>

  <!-- Flèches de translation -->
  <line x1="150" y1="250" x2="350" y2="200" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <line x1="250" y1="250" x2="450" y2="200" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
  <line x1="200" y1="150" x2="400" y2="100" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />

  <!-- Vecteur de référence -->
  <line x1="100" y1="350" x2="300" y2="300" stroke="#ef4444" stroke-width="4" marker-end="url(#arrow)" />
  <text x="200" y="340" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#b91c1c">Vecteur de translation</text>
  <text x="200" y="360" font-family="Inter, sans-serif" font-size="14" fill="#b91c1c">(+4 carreaux à droite, -1 carreau en haut)</text>
</svg>
