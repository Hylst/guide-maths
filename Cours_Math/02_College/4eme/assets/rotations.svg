<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafafa" />
  
  <!-- Titre -->
  <text x="50%" y="40" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#1e3a8a" text-anchor="middle">La Rotation (Pivotement)</text>

  <defs>
    <marker id="arrow-rot" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Centre de rotation -->
  <circle cx="300" cy="250" r="5" fill="#1e3a8a" />
  <text x="295" y="270" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a">O (Centre)</text>

  <!-- Figure originale (Drapeau) -->
  <g id="flag">
    <line x1="150" y1="250" x2="150" y2="100" stroke="#2563eb" stroke-width="4" />
    <polygon points="150,100 220,130 150,160" fill="#dbeafe" stroke="#2563eb" stroke-width="2" />
    <circle cx="150" cy="250" r="4" fill="#2563eb" />
    <text x="130" y="265" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a">A</text>
  </g>

  <!-- Figure image (Drapeau tourné de 90° sens anti-horaire) -->
  <g transform="rotate(90, 300, 250)">
    <line x1="150" y1="250" x2="150" y2="100" stroke="#db2777" stroke-width="4" />
    <polygon points="150,100 220,130 150,160" fill="#fce7f3" stroke="#db2777" stroke-width="2" />
    <circle cx="150" cy="250" r="4" fill="#db2777" />
  </g>
  <text x="310" y="90" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#9d174d">A'</text>

  <!-- Lignes de construction -->
  <line x1="300" y1="250" x2="150" y2="250" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="300" y1="250" x2="300" y2="100" stroke="#9ca3af" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Arc d'angle -->
  <path d="M 200 250 A 100 100 0 0 1 300 150" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#arrow-rot)" />
  <text x="210" y="190" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#047857">90°</text>
  
  <text x="450" y="200" font-family="Inter, sans-serif" font-size="16" fill="#047857" text-anchor="middle">Sens anti-horaire</text>
  <text x="450" y="220" font-family="Inter, sans-serif" font-size="16" fill="#047857" text-anchor="middle">(Sens direct)</text>

</svg>
