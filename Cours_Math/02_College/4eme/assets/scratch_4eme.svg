<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fef2f2" />
  <text x="50%" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#7f1d1d" text-anchor="middle">Conditions et Variables</text>
  
  <!-- Bloc Boucle Infinie (Répéter indéfiniment) -->
  <path d="M 100 70 Q 120 50 140 70 L 400 70 A 5 5 0 0 1 405 75 L 405 105 A 5 5 0 0 1 400 110 L 150 110 L 145 115 L 135 115 L 130 110 L 120 110 L 120 290 L 130 290 L 135 295 L 145 295 L 150 290 L 400 290 A 5 5 0 0 1 405 295 L 405 315 A 5 5 0 0 1 400 320 L 105 320 A 5 5 0 0 1 100 315 Z" fill="#f97316" stroke="#ea580c" stroke-width="2" />
  <text x="115" y="95" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">répéter indéfiniment</text>

  <!-- Bloc Condition (Si ... alors) -->
  <path d="M 120 110 L 150 110 L 155 115 L 165 115 L 170 110 L 380 110 A 5 5 0 0 1 385 115 L 385 145 A 5 5 0 0 1 380 150 L 170 150 L 165 155 L 155 155 L 150 150 L 140 150 L 140 250 L 150 250 L 155 255 L 165 255 L 170 250 L 380 250 A 5 5 0 0 1 385 255 L 385 275 A 5 5 0 0 1 380 280 L 125 280 A 5 5 0 0 1 120 275 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
  <text x="135" y="135" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">si</text>
  <text x="330" y="135" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">alors</text>

  <!-- Capteur (Touche pressée) - Forme hexagonale -->
  <polygon points="165,130 175,115 310,115 320,130 310,145 175,145" fill="#38bdf8" stroke="#0284c7" stroke-width="2" />
  <text x="180" y="135" font-family="Arial" font-size="14" font-weight="bold" fill="#ffffff">touche [espace] pressée ?</text>

  <!-- Bloc Variable (Ajouter à) -->
  <path d="M 140 150 L 170 150 L 175 155 L 185 155 L 190 150 L 360 150 A 5 5 0 0 1 365 155 L 365 185 A 5 5 0 0 1 360 190 L 140 190 Z" fill="#f97316" stroke="#ea580c" stroke-width="2" />
  <text x="155" y="175" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">ajouter 1 à [Score]</text>

  <!-- Bloc Mouvement (Aller à position aléatoire) -->
  <path d="M 140 190 L 170 190 L 175 195 L 185 195 L 190 190 L 360 190 A 5 5 0 0 1 365 195 L 365 225 A 5 5 0 0 1 360 230 L 140 230 Z" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
  <text x="155" y="215" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">aller à [position aléatoire]</text>

  <!-- Explications -->
  <line x1="420" y1="130" x2="480" y2="130" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />
  <text x="490" y="135" font-family="Arial" font-size="14" font-weight="bold" fill="#0284c7" text-anchor="start">Condition (Capteur)</text>

  <line x1="420" y1="170" x2="480" y2="170" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />
  <text x="490" y="175" font-family="Arial" font-size="14" font-weight="bold" fill="#ea580c" text-anchor="start">Variable (Mémoire)</text>
</svg>
