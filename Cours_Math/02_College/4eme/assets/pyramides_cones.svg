<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafafa" />
  
  <!-- Titre -->
  <text x="50%" y="40" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Pyramide et Cône de Révolution</text>

  <!-- PYRAMIDE -->
  <g transform="translate(150, 220)">
    <!-- Base (Perspective) -->
    <polygon points="-80,50 20,50 80,-10 -20,-10" fill="#dbeafe" stroke="#2563eb" stroke-width="2" stroke-linejoin="round" />
    <!-- Arêtes cachées -->
    <line x1="-80" y1="50" x2="-20" y2="-10" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="80" y1="-10" x2="-20" y2="-10" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,5" />
    <line x1="0" y1="-120" x2="-20" y2="-10" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,5" />
    
    <!-- Arêtes visibles -->
    <line x1="0" y1="-120" x2="-80" y2="50" stroke="#2563eb" stroke-width="2" />
    <line x1="0" y1="-120" x2="20" y2="50" stroke="#2563eb" stroke-width="2" />
    <line x1="0" y1="-120" x2="80" y2="-10" stroke="#2563eb" stroke-width="2" />
    
    <!-- Hauteur -->
    <line x1="0" y1="-120" x2="0" y2="20" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" />
    <polyline points="0,10 10,10 10,20" fill="none" stroke="#ef4444" stroke-width="2" />
    
    <!-- Sommet -->
    <circle cx="0" cy="-120" r="4" fill="#1e3a8a" />
    <text x="0" y="-130" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Sommet</text>
    
    <text x="10" y="-50" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#ef4444">h</text>
    <text x="0" y="80" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#1e3a8a" text-anchor="middle">Pyramide à base carrée</text>
  </g>

  <!-- CÔNE -->
  <g transform="translate(450, 220)">
    <!-- Base (Ellipse) -->
    <!-- Partie cachée -->
    <path d="M -70 20 A 70 25 0 0 1 70 20" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" />
    <!-- Partie visible -->
    <path d="M -70 20 A 70 25 0 0 0 70 20" fill="#d1fae5" stroke="#10b981" stroke-width="2" />
    <path d="M -70 20 A 70 25 0 0 1 70 20" fill="#d1fae5" opacity="0.5" />
    
    <!-- Génératrices -->
    <line x1="0" y1="-120" x2="-70" y2="20" stroke="#10b981" stroke-width="2" />
    <line x1="0" y1="-120" x2="70" y2="20" stroke="#10b981" stroke-width="2" />
    
    <!-- Hauteur -->
    <line x1="0" y1="-120" x2="0" y2="20" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" />
    <polyline points="0,10 10,10 10,20" fill="none" stroke="#ef4444" stroke-width="2" />
    
    <!-- Rayon -->
    <line x1="0" y1="20" x2="70" y2="20" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4" />
    <text x="35" y="15" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#d97706" text-anchor="middle">r</text>
    
    <!-- Sommet -->
    <circle cx="0" cy="-120" r="4" fill="#047857" />
    <text x="0" y="-130" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#047857" text-anchor="middle">Sommet</text>
    
    <text x="-15" y="-50" font-family="Inter, sans-serif" font-size="16" font-weight="bold" fill="#ef4444">h</text>
    <text x="0" y="80" font-family="Inter, sans-serif" font-size="18" font-weight="bold" fill="#047857" text-anchor="middle">Cône de révolution</text>
  </g>

</svg>
