<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="50%" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Les Puissances de 10</text>
  
  <!-- Axe central -->
  <line x1="50" y1="150" x2="550" y2="150" stroke="#334155" stroke-width="4" marker-end="url(#arrow)" />
  
  <!-- Graduations -->
  <g stroke="#0f172a" stroke-width="2">
    <line x1="100" y1="140" x2="100" y2="160" />
    <line x1="200" y1="140" x2="200" y2="160" />
    <line x1="300" y1="130" x2="300" y2="170" stroke-width="4" /> <!-- Zéro / Unité -->
    <line x1="400" y1="140" x2="400" y2="160" />
    <line x1="500" y1="140" x2="500" y2="160" />
  </g>
  
  <!-- Textes Puissances -->
  <g font-family="Courier New" font-size="20" font-weight="bold" text-anchor="middle">
    <text x="100" y="125" fill="#ef4444">10<tspan dy="-10" font-size="14">-6</tspan></text>
    <text x="200" y="125" fill="#ef4444">10<tspan dy="-10" font-size="14">-3</tspan></text>
    <text x="300" y="125" fill="#0f172a">10<tspan dy="-10" font-size="14">0</tspan></text>
    <text x="400" y="125" fill="#3b82f6">10<tspan dy="-10" font-size="14">3</tspan></text>
    <text x="500" y="125" fill="#3b82f6">10<tspan dy="-10" font-size="14">6</tspan></text>
  </g>
  
  <!-- Textes Valeurs -->
  <g font-family="Arial" font-size="14" text-anchor="middle" fill="#475569">
    <text x="100" y="185">0,000 001</text>
    <text x="200" y="185">0,001</text>
    <text x="300" y="185">1</text>
    <text x="400" y="185">1 000</text>
    <text x="500" y="185">1 000 000</text>
  </g>
  
  <!-- Textes Noms -->
  <g font-family="Arial" font-size="12" font-style="italic" text-anchor="middle" fill="#64748b">
    <text x="100" y="210">Millionième</text>
    <text x="100" y="225">(Micro)</text>
    <text x="200" y="210">Millième</text>
    <text x="200" y="225">(Milli)</text>
    <text x="300" y="210">Unité</text>
    <text x="400" y="210">Millier</text>
    <text x="400" y="225">(Kilo)</text>
    <text x="500" y="210">Million</text>
    <text x="500" y="225">(Méga)</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
  </defs>
</svg>
