<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fffbeb" />
  
  <text x="50%" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#b45309" text-anchor="middle">La Machine à Nombres : La Fonction f</text>

  <!-- La Machine -->
  <g transform="translate(200, 100)">
    <rect x="0" y="0" width="200" height="150" rx="15" fill="#fde68a" stroke="#d97706" stroke-width="4" />
    
    <!-- Engrenages décoratifs -->
    <circle cx="50" cy="50" r="20" fill="#f59e0b" stroke="#b45309" stroke-width="2" stroke-dasharray="5,5" />
    <circle cx="150" cy="100" r="30" fill="#f59e0b" stroke="#b45309" stroke-width="2" stroke-dasharray="8,8" />
    
    <!-- L'écran de la formule -->
    <rect x="25" y="60" width="150" height="40" rx="5" fill="#1e293b" />
    <text x="100" y="87" font-family="Courier New" font-size="20" font-weight="bold" fill="#10b981" text-anchor="middle">f(x) = 2x + 3</text>
    
    <text x="100" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#b45309" text-anchor="middle">Fonction f</text>
  </g>

  <!-- Entrée (Antécédent) -->
  <g transform="translate(50, 150)">
    <circle cx="40" cy="25" r="25" fill="#bfdbfe" stroke="#3b82f6" stroke-width="3" />
    <text x="40" y="32" font-family="Arial" font-size="20" font-weight="bold" fill="#1d4ed8" text-anchor="middle">4</text>
    
    <path d="M 70 25 L 180 25" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrowBlue)" />
    
    <text x="40" y="75" font-family="Arial" font-size="16" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Antécédent (x)</text>
    <text x="40" y="95" font-family="Arial" font-size="14" fill="#1d4ed8" text-anchor="middle">"Ce qui entre"</text>
  </g>

  <!-- Sortie (Image) -->
  <g transform="translate(420, 150)">
    <path d="M 0 25 L 90 25" stroke="#ef4444" stroke-width="4" marker-end="url(#arrowRed)" />
    
    <circle cx="120" cy="25" r="25" fill="#fecaca" stroke="#ef4444" stroke-width="3" />
    <text x="120" y="32" font-family="Arial" font-size="20" font-weight="bold" fill="#b91c1c" text-anchor="middle">11</text>
    
    <text x="120" y="75" font-family="Arial" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">Image f(x)</text>
    <text x="120" y="95" font-family="Arial" font-size="14" fill="#b91c1c" text-anchor="middle">"Ce qui sort"</text>
  </g>

  <!-- Explication du calcul -->
  <g transform="translate(300, 300)">
    <text x="0" y="0" font-family="Arial" font-size="18" fill="#78350f" text-anchor="middle">Calcul : f(4) = 2 × 4 + 3 = 8 + 3 = 11</text>
    <text x="0" y="25" font-family="Arial" font-size="16" font-style="italic" fill="#92400e" text-anchor="middle">"L'image de 4 par la fonction f est 11"</text>
  </g>

  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b82f6" />
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ef4444" />
    </marker>
  </defs>
</svg>
