<svg width="700" height="350" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  
  <text x="50%" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Les 2 configurations de Thalès</text>

  <!-- Configuration 1 : Classique (Triangles emboîtés) -->
  <g transform="translate(50, 80)">
    <text x="125" y="-20" font-family="Arial" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">1. Triangles emboîtés</text>
    
    <!-- Triangle principal ABC -->
    <polygon points="125,20 20,200 230,200" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" />
    
    <!-- Ligne parallèle MN -->
    <line x1="62" y1="110" x2="188" y2="110" stroke="#dc2626" stroke-width="3" />
    <line x1="20" y1="200" x2="230" y2="200" stroke="#dc2626" stroke-width="3" />
    
    <!-- Points et Noms -->
    <circle cx="125" cy="20" r="4" fill="#0f172a" />
    <text x="125" y="10" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="middle">A</text>
    
    <circle cx="62" cy="110" r="4" fill="#0f172a" />
    <text x="40" y="115" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">M</text>
    
    <circle cx="188" cy="110" r="4" fill="#0f172a" />
    <text x="200" y="115" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">N</text>
    
    <circle cx="20" cy="200" r="4" fill="#0f172a" />
    <text x="0" y="210" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">B</text>
    
    <circle cx="230" cy="200" r="4" fill="#0f172a" />
    <text x="240" y="210" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">C</text>
    
    <!-- Légende -->
    <text x="125" y="240" font-family="Arial" font-size="14" fill="#dc2626" text-anchor="middle">(MN) // (BC)</text>
  </g>

  <!-- Configuration 2 : Papillon -->
  <g transform="translate(400, 80)">
    <text x="125" y="-20" font-family="Arial" font-size="18" font-weight="bold" fill="#334155" text-anchor="middle">2. Le Papillon</text>
    
    <!-- Triangle Haut AMN -->
    <polygon points="125,110 50,20 200,20" fill="#fef08a" stroke="#ca8a04" stroke-width="2" />
    <!-- Triangle Bas ABC -->
    <polygon points="125,110 20,200 230,200" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" />
    
    <!-- Lignes parallèles -->
    <line x1="50" y1="20" x2="200" y2="20" stroke="#dc2626" stroke-width="3" />
    <line x1="20" y1="200" x2="230" y2="200" stroke="#dc2626" stroke-width="3" />
    
    <!-- Points et Noms -->
    <circle cx="125" cy="110" r="4" fill="#0f172a" />
    <text x="140" y="115" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">A</text>
    
    <circle cx="50" cy="20" r="4" fill="#0f172a" />
    <text x="30" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">M</text>
    
    <circle cx="200" cy="20" r="4" fill="#0f172a" />
    <text x="210" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">N</text>
    
    <circle cx="20" cy="200" r="4" fill="#0f172a" />
    <text x="0" y="210" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">C</text>
    
    <circle cx="230" cy="200" r="4" fill="#0f172a" />
    <text x="240" y="210" font-family="Arial" font-size="16" font-weight="bold" fill="#0f172a">B</text>
    
    <!-- Légende -->
    <text x="125" y="240" font-family="Arial" font-size="14" fill="#dc2626" text-anchor="middle">(MN) // (BC)</text>
  </g>

  <!-- Formule universelle -->
  <g transform="translate(350, 330)">
    <rect x="-250" y="-30" width="500" height="40" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" />
    <text x="0" y="-5" font-family="Arial" font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">
      AM / AB = AN / AC = MN / BC
    </text>
  </g>
</svg>
