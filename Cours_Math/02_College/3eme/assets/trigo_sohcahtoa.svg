<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0fdf4" />
  
  <text x="50%" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#14532d" text-anchor="middle">Trigonométrie : SOH CAH TOA</text>

  <!-- Le Triangle Rectangle -->
  <g transform="translate(100, 250)">
    <!-- Triangle ABC rectangle en B -->
    <!-- Côtés : AB=200 (Adjacent), BC=150 (Opposé), AC=250 (Hypoténuse) -->
    <polygon points="0,0 200,0 200,-150" fill="#dcfce7" stroke="#16a34a" stroke-width="3" />
    
    <!-- Angle droit en B -->
    <polyline points="180,0 180,-20 200,-20" fill="none" stroke="#ef4444" stroke-width="3" />
    
    <!-- Angle alpha en A -->
    <path d="M 40 0 A 40 40 0 0 0 32 -24" fill="none" stroke="#eab308" stroke-width="4" />
    <text x="50" y="-10" font-family="Arial" font-size="20" font-weight="bold" fill="#ca8a04">α</text>
    
    <!-- Noms des sommets -->
    <text x="-15" y="15" font-family="Arial" font-size="18" font-weight="bold" fill="#14532d">A</text>
    <text x="210" y="15" font-family="Arial" font-size="18" font-weight="bold" fill="#14532d">B</text>
    <text x="210" y="-155" font-family="Arial" font-size="18" font-weight="bold" fill="#14532d">C</text>
    
    <!-- Noms des côtés par rapport à l'angle A -->
    <!-- Hypoténuse -->
    <text x="80" y="-90" font-family="Arial" font-size="16" font-weight="bold" fill="#b91c1c" transform="rotate(-36.87, 80, -90)">Hypoténuse (H)</text>
    
    <!-- Côté Opposé -->
    <text x="215" y="-70" font-family="Arial" font-size="16" font-weight="bold" fill="#0284c7">Côté Opposé (O)</text>
    <text x="215" y="-50" font-family="Arial" font-size="12" fill="#0284c7">(En face de l'angle)</text>
    
    <!-- Côté Adjacent -->
    <text x="100" y="25" font-family="Arial" font-size="16" font-weight="bold" fill="#9333ea" text-anchor="middle">Côté Adjacent (A)</text>
    <text x="100" y="45" font-family="Arial" font-size="12" fill="#9333ea" text-anchor="middle">(Touche l'angle)</text>
  </g>

  <!-- Les Formules SOH CAH TOA -->
  <g transform="translate(420, 100)">
    <!-- SOH -->
    <rect x="0" y="0" width="150" height="60" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
    <text x="75" y="25" font-family="Arial" font-size="20" font-weight="bold" fill="#b91c1c" text-anchor="middle">S O H</text>
    <text x="75" y="45" font-family="Arial" font-size="14" fill="#b91c1c" text-anchor="middle">Sin = Opp / Hyp</text>
    
    <!-- CAH -->
    <rect x="0" y="70" width="150" height="60" rx="5" fill="#f3e8ff" stroke="#a855f7" stroke-width="2" />
    <text x="75" y="95" font-family="Arial" font-size="20" font-weight="bold" fill="#7e22ce" text-anchor="middle">C A H</text>
    <text x="75" y="115" font-family="Arial" font-size="14" fill="#7e22ce" text-anchor="middle">Cos = Adj / Hyp</text>
    
    <!-- TOA -->
    <rect x="0" y="140" width="150" height="60" rx="5" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2" />
    <text x="75" y="165" font-family="Arial" font-size="20" font-weight="bold" fill="#0369a1" text-anchor="middle">T O A</text>
    <text x="75" y="185" font-family="Arial" font-size="14" fill="#0369a1" text-anchor="middle">Tan = Opp / Adj</text>
  </g>
</svg>
