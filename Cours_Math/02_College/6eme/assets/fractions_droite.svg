<svg width="600" height="250" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fef2f2" />
  <text x="50%" y="40" font-family="Arial" font-size="22" font-weight="bold" fill="#7f1d1d" text-anchor="middle">Les Fractions sur la Demi-droite</text>

  <!-- L'axe principal -->
  <line x1="50" y1="150" x2="550" y2="150" stroke="#7f1d1d" stroke-width="4" marker-end="url(#arrowRed)" />
  
  <!-- L'unité (0 à 1) et (1 à 2) -->
  <!-- 0 -->
  <line x1="100" y1="130" x2="100" y2="170" stroke="#7f1d1d" stroke-width="4" />
  <text x="100" y="195" font-family="Arial" font-size="20" font-weight="bold" fill="#7f1d1d" text-anchor="middle">0</text>
  
  <!-- 1 -->
  <line x1="340" y1="130" x2="340" y2="170" stroke="#7f1d1d" stroke-width="4" />
  <text x="340" y="195" font-family="Arial" font-size="20" font-weight="bold" fill="#7f1d1d" text-anchor="middle">1</text>
  
  <!-- L'unité est divisée en 3 parts (Tiers) -->
  <!-- Espace total = 240px. Donc 1 part = 80px -->
  <path d="M 100 120 Q 140 80 180 120" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M 180 120 Q 220 80 260 120" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" />
  <path d="M 260 120 Q 300 80 340 120" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,4" />
  <text x="220" y="70" font-family="Arial" font-size="14" font-weight="bold" fill="#dc2626" text-anchor="middle">L'unité est coupée en 3 (Dénominateur = 3)</text>

  <!-- Graduations des tiers -->
  <line x1="180" y1="140" x2="180" y2="160" stroke="#ef4444" stroke-width="2" />
  <line x1="260" y1="140" x2="260" y2="160" stroke="#ef4444" stroke-width="2" />
  <line x1="420" y1="140" x2="420" y2="160" stroke="#ef4444" stroke-width="2" />
  <line x1="500" y1="140" x2="500" y2="160" stroke="#ef4444" stroke-width="2" />

  <!-- Placement des fractions -->
  <!-- 1/3 -->
  <circle cx="180" cy="150" r="6" fill="#2563eb" />
  <text x="180" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#2563eb" text-anchor="middle">1/3</text>
  
  <!-- 4/3 -->
  <circle cx="420" cy="150" r="6" fill="#059669" />
  <text x="420" y="220" font-family="Arial" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">4/3</text>
  <text x="420" y="240" font-family="Arial" font-size="14" fill="#059669" text-anchor="middle">(C'est 1 + 1/3)</text>

  <!-- 3/3 = 1 -->
  <text x="340" y="220" font-family="Arial" font-size="16" fill="#7f1d1d" text-anchor="middle">3/3</text>

  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7f1d1d" />
    </marker>
  </defs>
</svg>
