<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#eff6ff" />
  <text x="50%" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#1e3a8a" text-anchor="middle">La Symétrie Axiale (Effet Miroir)</text>
  <!-- Axe de symétrie -->
  <line x1="300" y1="60" x2="300" y2="280" stroke="#dc2626" stroke-width="3" stroke-dasharray="10,5" />
  <text x="300" y="50" font-family="Arial" font-size="16" font-weight="bold" fill="#dc2626" text-anchor="middle">Axe de symétrie (d)</text>
  <!-- Triangle gauche -->
  <polygon points="150,100 250,150 100,220" fill="#bfdbfe" stroke="#2563eb" stroke-width="3" />
  <text x="140" y="90" font-family="Arial" font-size="16" font-weight="bold" fill="#1e40af">A</text>
  <!-- Triangle droit -->
  <polygon points="450,100 350,150 500,220" fill="#bfdbfe" stroke="#2563eb" stroke-width="3" />
  <text x="450" y="90" font-family="Arial" font-size="16" font-weight="bold" fill="#1e40af">A'</text>
  <!-- Ligne de construction pour A et A' -->
  <line x1="150" y1="100" x2="450" y2="100" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />
  <!-- Angle droit -->
  <polyline points="290,100 290,110 300,110" fill="none" stroke="#0f172a" stroke-width="2" />
  <!-- Codage milieu -->
  <line x1="220" y1="95" x2="220" y2="105" stroke="#0f172a" stroke-width="2" />
  <line x1="230" y1="95" x2="230" y2="105" stroke="#0f172a" stroke-width="2" />
  <line x1="370" y1="95" x2="370" y2="105" stroke="#0f172a" stroke-width="2" />
  <line x1="380" y1="95" x2="380" y2="105" stroke="#0f172a" stroke-width="2" />
</svg>
