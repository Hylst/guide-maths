<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f8fafc" />
  <text x="50%" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Mon Premier Script Scratch</text>
  
  <!-- Bloc Événement (Drapeau vert) -->
  <path d="M 200 70 Q 220 50 240 70 L 400 70 A 5 5 0 0 1 405 75 L 405 105 A 5 5 0 0 1 400 110 L 250 110 L 245 115 L 235 115 L 230 110 L 205 110 A 5 5 0 0 1 200 105 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
  <text x="215" y="95" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Quand 🏁 est cliqué</text>

  <!-- Bloc Mouvement (Aller à) -->
  <path d="M 200 110 L 230 110 L 235 115 L 245 115 L 250 110 L 400 110 A 5 5 0 0 1 405 115 L 405 145 A 5 5 0 0 1 400 150 L 250 150 L 245 155 L 235 155 L 230 150 L 205 150 A 5 5 0 0 1 200 145 Z" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
  <text x="215" y="135" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">aller à x: 0 y: 0</text>

  <!-- Bloc Mouvement (Avancer) -->
  <path d="M 200 150 L 230 150 L 235 155 L 245 155 L 250 150 L 400 150 A 5 5 0 0 1 405 155 L 405 185 A 5 5 0 0 1 400 190 L 250 190 L 245 195 L 235 195 L 230 190 L 205 190 A 5 5 0 0 1 200 185 Z" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
  <text x="215" y="175" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">avancer de 50 pas</text>

  <!-- Bloc Mouvement (Tourner) -->
  <path d="M 200 190 L 230 190 L 235 195 L 245 195 L 250 190 L 400 190 A 5 5 0 0 1 405 195 L 405 225 A 5 5 0 0 1 400 230 L 250 230 L 245 235 L 235 235 L 230 230 L 205 230 A 5 5 0 0 1 200 225 Z" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
  <text x="215" y="215" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">tourner ↻ de 90 degrés</text>

  <!-- Explications -->
  <line x1="180" y1="90" x2="100" y2="90" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />
  <text x="90" y="95" font-family="Arial" font-size="14" fill="#475569" text-anchor="end">Événement de départ</text>

  <line x1="420" y1="130" x2="500" y2="130" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />
  <text x="510" y="135" font-family="Arial" font-size="14" fill="#475569" text-anchor="start">Position initiale (Centre)</text>

  <line x1="420" y1="195" x2="500" y2="195" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />
  <text x="510" y="200" font-family="Arial" font-size="14" fill="#475569" text-anchor="start">Déplacements</text>
</svg>
