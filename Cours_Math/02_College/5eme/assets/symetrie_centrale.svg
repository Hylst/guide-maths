<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fdf4ff" />
  <text x="50%" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#701a75" text-anchor="middle">La Symétrie Centrale (Demi-tour)</text>
  <!-- Centre O -->
  <circle cx="300" cy="160" r="5" fill="#dc2626" />
  <text x="300" y="180" font-family="Arial" font-size="18" font-weight="bold" fill="#dc2626" text-anchor="middle">O</text>
  <!-- Triangle haut gauche -->
  <polygon points="150,80 250,80 150,130" fill="#f5d0fe" stroke="#a21caf" stroke-width="3" />
  <text x="130" y="75" font-family="Arial" font-size="16" font-weight="bold" fill="#701a75">A</text>
  <!-- Triangle bas droit -->
  <polygon points="450,240 350,240 450,190" fill="#f5d0fe" stroke="#a21caf" stroke-width="3" />
  <text x="460" y="255" font-family="Arial" font-size="16" font-weight="bold" fill="#701a75">A'</text>
  <!-- Ligne de construction -->
  <line x1="150" y1="80" x2="450" y2="240" stroke="#64748b" stroke-width="2" stroke-dasharray="4,4" />
  <!-- Codage milieu -->
  <line x1="220" y1="130" x2="230" y2="145" stroke="#0f172a" stroke-width="2" />
  <line x1="370" y1="175" x2="380" y2="190" stroke="#0f172a" stroke-width="2" />
  <!-- Flèche de rotation -->
  <path d="M 200 100 A 120 120 0 0 1 400 220" fill="none" stroke="#d946ef" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowPink)" />
  <text x="420" y="150" font-family="Arial" font-size="14" font-weight="bold" fill="#d946ef">180°</text>
  <defs>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d946ef" />
    </marker>
  </defs>
</svg>
