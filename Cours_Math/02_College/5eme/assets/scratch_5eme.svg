<svg width="600" height="350" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0fdf4" />
  <text x="50%" y="30" font-family="Arial" font-size="22" font-weight="bold" fill="#14532d" text-anchor="middle">Les Boucles et le Tracé (Le Carré)</text>
  
  <!-- Bloc Événement -->
  <path d="M 150 70 Q 170 50 190 70 L 350 70 A 5 5 0 0 1 355 75 L 355 105 A 5 5 0 0 1 350 110 L 200 110 L 195 115 L 185 115 L 180 110 L 155 110 A 5 5 0 0 1 150 105 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
  <text x="165" y="95" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">Quand 🏁 est cliqué</text>

  <!-- Bloc Stylo (Effacer tout) -->
  <path d="M 150 110 L 180 110 L 185 115 L 195 115 L 200 110 L 350 110 A 5 5 0 0 1 355 115 L 355 145 A 5 5 0 0 1 350 150 L 200 150 L 195 155 L 185 155 L 180 150 L 155 150 A 5 5 0 0 1 150 145 Z" fill="#10b981" stroke="#059669" stroke-width="2" />
  <text x="165" y="135" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">effacer tout</text>

  <!-- Bloc Stylo (Stylo en position d'écriture) -->
  <path d="M 150 150 L 180 150 L 185 155 L 195 155 L 200 150 L 350 150 A 5 5 0 0 1 355 155 L 355 185 A 5 5 0 0 1 350 190 L 200 190 L 195 195 L 185 195 L 180 190 L 155 190 A 5 5 0 0 1 150 185 Z" fill="#10b981" stroke="#059669" stroke-width="2" />
  <text x="165" y="175" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">stylo en position d'écriture</text>

  <!-- Bloc Boucle (Répéter) -->
  <path d="M 150 190 L 180 190 L 185 195 L 195 195 L 200 190 L 350 190 A 5 5 0 0 1 355 195 L 355 225 A 5 5 0 0 1 350 230 L 200 230 L 195 235 L 185 235 L 180 230 L 170 230 L 170 310 L 180 310 L 185 315 L 195 315 L 200 310 L 350 310 A 5 5 0 0 1 355 315 L 355 335 A 5 5 0 0 1 350 340 L 155 340 A 5 5 0 0 1 150 335 Z" fill="#f97316" stroke="#ea580c" stroke-width="2" />
  <text x="165" y="215" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">répéter 4 fois</text>

  <!-- Blocs à l'intérieur de la boucle -->
  <!-- Avancer -->
  <path d="M 170 230 L 180 230 L 185 235 L 195 235 L 200 230 L 330 230 A 5 5 0 0 1 335 235 L 335 265 A 5 5 0 0 1 330 270 L 200 270 L 195 275 L 185 275 L 180 270 L 175 270 A 5 5 0 0 1 170 265 Z" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
  <text x="185" y="255" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">avancer de 100 pas</text>

  <!-- Tourner -->
  <path d="M 170 270 L 180 270 L 185 275 L 195 275 L 200 270 L 330 270 A 5 5 0 0 1 335 275 L 335 305 A 5 5 0 0 1 330 310 L 200 310 L 195 315 L 185 315 L 180 310 L 175 310 A 5 5 0 0 1 170 305 Z" fill="#3b82f6" stroke="#2563eb" stroke-width="2" />
  <text x="185" y="295" font-family="Arial" font-size="16" font-weight="bold" fill="#ffffff">tourner ↻ de 90 degrés</text>

  <!-- Illustration du résultat -->
  <g transform="translate(420, 150)">
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="#10b981" stroke-width="4" stroke-dasharray="8,4" />
    <circle cx="0" cy="0" r="5" fill="#ef4444" />
    <text x="-10" y="-10" font-family="Arial" font-size="14" fill="#ef4444" font-weight="bold">Départ</text>
    <path d="M 0 0 L 100 0 L 100 100 L 0 100 Z" fill="none" stroke="#10b981" stroke-width="4" />
  </g>
</svg>
