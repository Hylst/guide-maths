<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <style>
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 4; }
      .vector-e1 { stroke: #3b82f6; stroke-width: 3; marker-end: url(#arrow-blue); }
      .vector-e2 { stroke: #10b981; stroke-width: 3; marker-end: url(#arrow-green); }
      .vector-v { stroke: #ef4444; stroke-width: 4; marker-end: url(#arrow-red); }
      .proj-line { stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 4 4; }
      .text-label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; }
      .text-math { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: bold; }
      
      /* Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes drawLine { from { stroke-dasharray: 0 1000; } to { stroke-dasharray: 1000 1000; } }
      @keyframes drawVector { from { stroke-dasharray: 0 500; } to { stroke-dasharray: 500 500; } }
      
      .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
      .anim-draw { animation: drawLine 1.5s ease-out forwards; }
      .anim-vec { animation: drawVector 1s ease-out forwards; }
      
      .delay-1 { animation-delay: 0.5s; }
      .delay-2 { animation-delay: 1.5s; }
      .delay-3 { animation-delay: 2.5s; }
      .delay-4 { animation-delay: 4s; }
      .delay-5 { animation-delay: 5s; }
    </style>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/></marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc" rx="12" />

  <!-- Grid (skewed to represent a non-orthogonal basis) -->
  <g class="grid" transform="translate(150, 250)">
    <!-- Lines parallel to e1 (horizontal) -->
    <line x1="-100" y1="-150" x2="400" y2="-150" />
    <line x1="-100" y1="-100" x2="400" y2="-100" />
    <line x1="-100" y1="-50" x2="400" y2="-50" />
    <line x1="-100" y1="50" x2="400" y2="50" />
    <line x1="-100" y1="100" x2="400" y2="100" />
    
    <!-- Lines parallel to e2 (skewed, dx=50, dy=-100) -->
    <line x1="-50" y1="100" x2="75" y2="-150" />
    <line x1="0" y1="100" x2="125" y2="-150" />
    <line x1="50" y1="100" x2="175" y2="-150" />
    <line x1="100" y1="100" x2="225" y2="-150" />
    <line x1="150" y1="100" x2="275" y2="-150" />
    <line x1="200" y1="100" x2="325" y2="-150" />
    <line x1="250" y1="100" x2="375" y2="-150" />
  </g>

  <!-- Title -->
  <text x="300" y="30" class="text-label anim-fade" fill="#1e293b" text-anchor="middle" font-size="18px" font-weight="600">Base et Combinaison Linéaire</text>

  <g transform="translate(150, 250)">
    <!-- Axes (Basis lines) -->
    <line x1="-50" y1="0" x2="350" y2="0" class="axis" marker-end="url(#arrow-gray)" />
    <line x1="-25" y1="50" x2="75" y2="-150" class="axis" marker-end="url(#arrow-gray)" />
    <text x="-15" y="15" class="text-label" fill="#64748b">O</text>

    <!-- Basis Vectors e1 and e2 -->
    <g class="anim-fade delay-1">
      <!-- e1: (100, 0) -->
      <line x1="0" y1="0" x2="95" y2="0" class="vector-e1 anim-vec" />
      <text x="50" y="20" class="text-math" fill="#3b82f6">e₁</text>
      
      <!-- e2: (50, -100) -->
      <line x1="0" y1="0" x2="47" y2="-94" class="vector-e2 anim-vec" />
      <text x="10" y="-50" class="text-math" fill="#10b981">e₂</text>
    </g>

    <!-- Target Vector v = 2.5*e1 + 1.5*e2 -->
    <!-- v_x = 2.5*100 + 1.5*50 = 250 + 75 = 325 -->
    <!-- v_y = 2.5*0 + 1.5*(-100) = -150 -->
    
    <!-- Projections (Components) -->
    <g class="anim-fade delay-2">
      <!-- 2.5 * e1 -->
      <line x1="0" y1="0" x2="250" y2="0" stroke="#3b82f6" stroke-width="4" opacity="0.4" class="anim-draw" />
      <text x="125" y="20" class="text-math" fill="#3b82f6">2.5 e₁</text>
    </g>
    
    <g class="anim-fade delay-3">
      <!-- 1.5 * e2 (drawn from end of 2.5*e1 to show addition) -->
      <line x1="250" y1="0" x2="325" y2="-150" stroke="#10b981" stroke-width="4" opacity="0.4" class="anim-draw" />
      <text x="295" y="-75" class="text-math" fill="#10b981">1.5 e₂</text>
      
      <!-- Projection lines to axes -->
      <line x1="325" y1="-150" x2="250" y2="0" class="proj-line anim-draw" />
      <line x1="325" y1="-150" x2="75" y2="-150" class="proj-line anim-draw" />
    </g>

    <!-- Resulting Vector v -->
    <g class="anim-fade delay-4">
      <line x1="0" y1="0" x2="320" y2="-148" class="vector-v anim-vec" />
      <text x="160" y="-85" class="text-math" fill="#ef4444">v</text>
    </g>
  </g>

  <!-- Explanation Box -->
  <g class="anim-fade delay-5">
    <rect x="50" y="340" width="500" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <text x="300" y="365" class="text-label" fill="#334155" text-anchor="middle">Tout vecteur <tspan font-family="JetBrains Mono" font-weight="bold" fill="#ef4444">v</tspan> s'écrit de manière unique : <tspan font-family="JetBrains Mono" font-weight="bold" fill="#ef4444">v</tspan> = <tspan font-family="JetBrains Mono" font-weight="bold" fill="#3b82f6">x·e₁</tspan> + <tspan font-family="JetBrains Mono" font-weight="bold" fill="#10b981">y·e₂</tspan></text>
  </g>

</svg>
