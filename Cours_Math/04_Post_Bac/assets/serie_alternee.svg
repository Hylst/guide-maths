<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <style>
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 4; }
      .line-sn { stroke: #4f46e5; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .point-sn { fill: #4f46e5; stroke: #ffffff; stroke-width: 2; }
      .limit-line { stroke: #10b981; stroke-width: 2; stroke-dasharray: 6 4; }
      .text-label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; }
      .text-math { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: bold; }
      
      /* Animations */
      @keyframes drawLine { from { stroke-dasharray: 0 1000; } to { stroke-dasharray: 1000 1000; } }
      @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      
      .anim-line { animation: drawLine 3s ease-out forwards; }
      .anim-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: center; opacity: 0; }
      .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
      
      /* Staggered delays */
      .d-0 { animation-delay: 0.5s; }
      .d-1 { animation-delay: 1.0s; }
      .d-2 { animation-delay: 1.5s; }
      .d-3 { animation-delay: 2.0s; }
      .d-4 { animation-delay: 2.5s; }
      .d-5 { animation-delay: 3.0s; }
      .d-6 { animation-delay: 3.5s; }
      .d-7 { animation-delay: 4.0s; }
      .d-8 { animation-delay: 4.5s; }
      
      .d-line { animation-delay: 0.5s; }
      .d-limit { animation-delay: 5.5s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc" rx="12" />

  <!-- Grid -->
  <g class="grid">
    <line x1="50" y1="100" x2="550" y2="100" />
    <line x1="50" y1="150" x2="550" y2="150" />
    <line x1="50" y1="200" x2="550" y2="200" />
    <line x1="50" y1="250" x2="550" y2="250" />
  </g>

  <!-- Axes -->
  <g class="axis">
    <line x1="50" y1="300" x2="550" y2="300" /> <!-- n-axis -->
    <line x1="100" y1="350" x2="100" y2="50" /> <!-- value-axis -->
    <!-- Arrows -->
    <polygon points="550,300 540,295 540,305" fill="#94a3b8" />
    <polygon points="100,50 95,60 105,60" fill="#94a3b8" />
  </g>

  <!-- Labels -->
  <text x="530" y="320" class="text-label" fill="#64748b">n</text>
  <text x="70" y="60" class="text-label" fill="#64748b">Valeur</text>
  <text x="85" y="315" class="text-label" fill="#64748b">0</text>

  <!-- Title -->
  <text x="300" y="30" class="text-label anim-fade" fill="#1e293b" text-anchor="middle" font-size="18px" font-weight="600">Série Alternée (Sommes Partielles)</text>

  <!-- Data: Alternating harmonic series u_n = (-1)^(n+1) / n -->
  <!-- S_n = sum_{k=1}^n (-1)^(k+1) / k -->
  <!-- Limit S = ln(2) approx 0.693 -->
  <!-- Let's scale: y=300 is 0, y=100 is 1. So 1 unit = 200px. -->
  <!-- S_1 = 1 (y=100) -->
  <!-- S_2 = 1 - 1/2 = 0.5 (y=200) -->
  <!-- S_3 = 0.5 + 1/3 = 0.833 (y=133.3) -->
  <!-- S_4 = 0.833 - 1/4 = 0.583 (y=183.3) -->
  <!-- S_5 = 0.583 + 1/5 = 0.783 (y=143.3) -->
  <!-- S_6 = 0.783 - 1/6 = 0.616 (y=176.6) -->
  <!-- S_7 = 0.616 + 1/7 = 0.759 (y=148.1) -->
  <!-- S_8 = 0.759 - 1/8 = 0.634 (y=173.1) -->
  <!-- S_9 = 0.634 + 1/9 = 0.745 (y=150.9) -->
  <!-- S_10 = 0.745 - 1/10 = 0.645 (y=170.9) -->
  <!-- Limit ln(2) = 0.693 (y=161.4) -->
  
  <!-- S_n line (indigo) -->
  <path d="M 140 100 L 180 200 L 220 133.3 L 260 183.3 L 300 143.3 L 340 176.6 L 380 148.1 L 420 173.1 L 460 150.9 L 500 170.9" class="line-sn anim-line d-line" stroke-dasharray="1000" />

  <!-- S_n points -->
  <circle cx="140" cy="100" r="5" class="point-sn anim-pop d-0" />
  <circle cx="180" cy="200" r="5" class="point-sn anim-pop d-1" />
  <circle cx="220" cy="133.3" r="5" class="point-sn anim-pop d-2" />
  <circle cx="260" cy="183.3" r="5" class="point-sn anim-pop d-3" />
  <circle cx="300" cy="143.3" r="5" class="point-sn anim-pop d-4" />
  <circle cx="340" cy="176.6" r="5" class="point-sn anim-pop d-5" />
  <circle cx="380" cy="148.1" r="5" class="point-sn anim-pop d-6" />
  <circle cx="420" cy="173.1" r="5" class="point-sn anim-pop d-7" />
  <circle cx="460" cy="150.9" r="5" class="point-sn anim-pop d-8" />
  <circle cx="500" cy="170.9" r="5" class="point-sn anim-pop d-8" />

  <!-- Limit Line (S = ln(2), y=161.4) -->
  <g class="anim-fade d-limit">
    <line x1="100" y1="161.4" x2="550" y2="161.4" class="limit-line" />
    <text x="50" y="166" class="text-math" fill="#10b981">S</text>
    <text x="450" y="150" class="text-label" fill="#10b981">Limite ln(2)</text>
  </g>

  <!-- Explanation Box -->
  <g class="anim-fade d-limit">
    <rect x="50" y="340" width="500" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <text x="300" y="365" class="text-label" fill="#334155" text-anchor="middle">Les sommes partielles oscillent autour de la limite <tspan font-family="JetBrains Mono" font-weight="bold" fill="#10b981">S</tspan> en s'en rapprochant.</text>
  </g>

</svg>
