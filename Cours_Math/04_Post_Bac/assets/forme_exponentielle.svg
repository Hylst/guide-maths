<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <style>
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .circle { fill: none; stroke: #e2e8f0; stroke-width: 2; }
      .point { fill: #ef4444; }
      .line { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; }
      .vector { stroke: #ef4444; stroke-width: 3; marker-end: url(#arrow-red); }
      .angle-arc { fill: #fecaca; opacity: 0.5; stroke: #ef4444; stroke-width: 2; }
      .text-label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; }
      .text-math { font-family: 'JetBrains Mono', monospace; font-size: 16px; }
      
      /* Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes drawLine { from { stroke-dasharray: 0 1000; } to { stroke-dasharray: 1000 1000; } }
      @keyframes drawArc { from { stroke-dasharray: 0 200; } to { stroke-dasharray: 200 200; } }
      @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
      
      .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
      .anim-draw { animation: drawLine 1.5s ease-out forwards; }
      .anim-arc { animation: drawArc 1s ease-out forwards; }
      .anim-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: 429px 65px; opacity: 0; }
      
      .delay-1 { animation-delay: 0.5s; }
      .delay-2 { animation-delay: 1.5s; }
      .delay-3 { animation-delay: 2.5s; }
      .delay-4 { animation-delay: 3.5s; }
      .delay-5 { animation-delay: 4.5s; }
    </style>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc" rx="12" />

  <!-- Axes -->
  <g class="axis">
    <line x1="50" y1="200" x2="550" y2="200" marker-end="url(#arrow-gray)" /> <!-- Real axis -->
    <line x1="200" y1="350" x2="200" y2="50" marker-end="url(#arrow-gray)" /> <!-- Imaginary axis -->
  </g>

  <!-- Labels -->
  <text x="530" y="220" class="text-label" fill="#64748b">Re</text>
  <text x="160" y="60" class="text-label" fill="#64748b">Im</text>
  <text x="185" y="215" class="text-label" fill="#64748b">O</text>

  <!-- Title -->
  <text x="300" y="30" class="text-label anim-fade" fill="#1e293b" text-anchor="middle" font-size="18px" font-weight="600">Forme Exponentielle</text>

  <!-- Circle of radius r -->
  <!-- Let r = 2.64 units (approx 264px). Center at (200, 200). -->
  <!-- Let angle theta = pi/6 (30 degrees). -->
  <!-- x = 200 + 264 * cos(30) = 200 + 264 * 0.866 = 428.6 -->
  <!-- y = 200 - 264 * sin(30) = 200 - 264 * 0.5 = 68 -->
  <g class="anim-fade delay-1">
    <circle cx="200" cy="200" r="264" class="circle" stroke-dasharray="5 5" />
  </g>

  <!-- Angle theta -->
  <g class="anim-fade delay-2">
    <!-- Arc for angle: radius 50px -->
    <!-- Start at (250, 200), end at 200 + 50*cos(30) = 243.3, 200 - 50*sin(30) = 175 -->
    <path d="M 200 200 L 250 200 A 50 50 0 0 0 243.3 175 Z" class="angle-arc anim-arc" />
    <text x="260" y="190" class="text-math" fill="#ef4444" font-weight="bold">θ</text>
  </g>

  <!-- Vector OM (radius r) -->
  <g class="anim-fade delay-3">
    <line x1="200" y1="200" x2="425" y2="70" class="vector anim-draw" />
    <text x="300" y="120" class="text-math" fill="#ef4444" font-weight="bold">r = |z|</text>
  </g>

  <!-- Projections (cos and sin) -->
  <g class="anim-fade delay-4">
    <line x1="428.6" y1="68" x2="428.6" y2="200" class="line anim-draw" />
    <line x1="200" y1="68" x2="428.6" y2="68" class="line anim-draw" />
    <text x="400" y="220" class="text-math" fill="#64748b" font-size="14px">r cos(θ)</text>
    <text x="120" y="75" class="text-math" fill="#64748b" font-size="14px">i r sin(θ)</text>
  </g>

  <!-- Point M -->
  <g class="anim-pop delay-5">
    <circle cx="428.6" cy="68" r="6" class="point" />
    <text x="445" y="65" class="text-math" fill="#ef4444" font-weight="bold">z = r e<tspan dy="-8" font-size="12px">iθ</tspan></text>
    <text x="445" y="85" class="text-math" fill="#ef4444" font-size="14px">= r(cos θ + i sin θ)</text>
  </g>

</svg>
