<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <style>
      .axis { stroke: #94a3b8; stroke-width: 2; }
      .grid { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 4; }
      .bar-un { fill: #3b82f6; opacity: 0.7; rx: 4; }
      .line-sn { stroke: #ef4444; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .point-sn { fill: #ef4444; stroke: #ffffff; stroke-width: 2; }
      .limit-line { stroke: #10b981; stroke-width: 2; stroke-dasharray: 6 4; }
      .text-label { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; }
      .text-math { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: bold; }
      
      /* Animations */
      @keyframes growBar { from { height: 0; y: 300; } }
      @keyframes drawLine { from { stroke-dasharray: 0 1000; } to { stroke-dasharray: 1000 1000; } }
      @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      
      .anim-bar { animation: growBar 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
      .anim-line { animation: drawLine 2s ease-out forwards; }
      .anim-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; transform-origin: center; opacity: 0; }
      .anim-fade { animation: fadeIn 1s ease-out forwards; opacity: 0; }
      
      /* Staggered delays for bars and points */
      .d-0 { animation-delay: 0.5s; }
      .d-1 { animation-delay: 1.0s; }
      .d-2 { animation-delay: 1.5s; }
      .d-3 { animation-delay: 2.0s; }
      .d-4 { animation-delay: 2.5s; }
      .d-5 { animation-delay: 3.0s; }
      .d-6 { animation-delay: 3.5s; }
      .d-7 { animation-delay: 4.0s; }
      .d-8 { animation-delay: 4.5s; }
      
      .d-line { animation-delay: 0.5s; }
      .d-limit { animation-delay: 5.5s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#f8fafc" rx="12" />

  <!-- Grid -->
  <g class="grid">
    <line x1="50" y1="100" x2="550" y2="100" />
    <line x1="50" y1="150" x2="550" y2="150" />
    <line x1="50" y1="200" x2="550" y2="200" />
    <line x1="50" y1="250" x2="550" y2="250" />
  </g>

  <!-- Axes -->
  <g class="axis">
    <line x1="50" y1="300" x2="550" y2="300" /> <!-- n-axis -->
    <line x1="100" y1="350" x2="100" y2="50" /> <!-- value-axis -->
    <!-- Arrows -->
    <polygon points="550,300 540,295 540,305" fill="#94a3b8" />
    <polygon points="100,50 95,60 105,60" fill="#94a3b8" />
  </g>

  <!-- Labels -->
  <text x="530" y="320" class="text-label" fill="#64748b">n</text>
  <text x="70" y="60" class="text-label" fill="#64748b">Valeur</text>
  <text x="85" y="315" class="text-label" fill="#64748b">0</text>

  <!-- Title -->
  <text x="300" y="30" class="text-label anim-fade" fill="#1e293b" text-anchor="middle" font-size="18px" font-weight="600">Sommes Partielles d'une Série</text>

  <!-- Data: Geometric series u_n = 100 * (1/2)^n -->
  <!-- S_n = 100 * (1 - (1/2)^(n+1)) / (1 - 1/2) = 200 * (1 - (1/2)^(n+1)) -->
  <!-- Limit S = 200 -->
  <!-- Let's scale: y=300 is 0, y=100 is 200. So 1 unit = 1px. -->
  
  <!-- u_n bars (blue) -->
  <!-- u_0 = 100 -->
  <rect x="130" y="200" width="20" height="100" class="bar-un anim-bar d-0" />
  <!-- u_1 = 50 -->
  <rect x="180" y="250" width="20" height="50" class="bar-un anim-bar d-1" />
  <!-- u_2 = 25 -->
  <rect x="230" y="275" width="20" height="25" class="bar-un anim-bar d-2" />
  <!-- u_3 = 12.5 -->
  <rect x="280" y="287.5" width="20" height="12.5" class="bar-un anim-bar d-3" />
  <!-- u_4 = 6.25 -->
  <rect x="330" y="293.75" width="20" height="6.25" class="bar-un anim-bar d-4" />
  <!-- u_5 = 3.125 -->
  <rect x="380" y="296.875" width="20" height="3.125" class="bar-un anim-bar d-5" />
  <!-- u_6 = 1.56 -->
  <rect x="430" y="298.44" width="20" height="1.56" class="bar-un anim-bar d-6" />
  <!-- u_7 = 0.78 -->
  <rect x="480" y="299.22" width="20" height="0.78" class="bar-un anim-bar d-7" />

  <!-- S_n line (red) -->
  <!-- S_0 = 100 (y=200) -->
  <!-- S_1 = 150 (y=150) -->
  <!-- S_2 = 175 (y=125) -->
  <!-- S_3 = 187.5 (y=112.5) -->
  <!-- S_4 = 193.75 (y=106.25) -->
  <!-- S_5 = 196.875 (y=103.125) -->
  <!-- S_6 = 198.44 (y=101.56) -->
  <!-- S_7 = 199.22 (y=100.78) -->
  <path d="M 140 200 L 190 150 L 240 125 L 290 112.5 L 340 106.25 L 390 103.125 L 440 101.56 L 490 100.78" class="line-sn anim-line d-line" stroke-dasharray="1000" />

  <!-- S_n points -->
  <circle cx="140" cy="200" r="5" class="point-sn anim-pop d-0" />
  <circle cx="190" cy="150" r="5" class="point-sn anim-pop d-1" />
  <circle cx="240" cy="125" r="5" class="point-sn anim-pop d-2" />
  <circle cx="290" cy="112.5" r="5" class="point-sn anim-pop d-3" />
  <circle cx="340" cy="106.25" r="5" class="point-sn anim-pop d-4" />
  <circle cx="390" cy="103.125" r="5" class="point-sn anim-pop d-5" />
  <circle cx="440" cy="101.56" r="5" class="point-sn anim-pop d-6" />
  <circle cx="490" cy="100.78" r="5" class="point-sn anim-pop d-7" />

  <!-- Limit Line (S = 200, y=100) -->
  <g class="anim-fade d-limit">
    <line x1="100" y1="100" x2="550" y2="100" class="limit-line" />
    <text x="50" y="105" class="text-math" fill="#10b981">S</text>
    <text x="450" y="85" class="text-label" fill="#10b981">Limite (Somme de la série)</text>
  </g>

  <!-- Legend -->
  <g class="anim-fade d-limit">
    <rect x="350" y="150" width="180" height="70" rx="4" fill="#ffffff" stroke="#e2e8f0" />
    <rect x="360" y="160" width="15" height="15" class="bar-un" />
    <text x="385" y="172" class="text-math" fill="#3b82f6" font-size="14px">u_n (Terme)</text>
    
    <line x1="360" y1="195" x2="375" y2="195" class="line-sn" />
    <circle cx="367.5" cy="195" r="4" class="point-sn" />
    <text x="385" y="200" class="text-math" fill="#ef4444" font-size="14px">S_n (Somme part.)</text>
  </g>

  <!-- Explanation Box -->
  <g class="anim-fade d-limit">
    <rect x="50" y="340" width="500" height="40" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" />
    <text x="300" y="365" class="text-label" fill="#334155" text-anchor="middle">La série converge si la suite des sommes partielles <tspan font-family="JetBrains Mono" font-weight="bold" fill="#ef4444">S_n</tspan> admet une limite <tspan font-family="JetBrains Mono" font-weight="bold" fill="#10b981">S</tspan>.</text>
  </g>

</svg>
