<svg width="500" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fdf4ff" />
  <text x="50%" y="40" font-family="Arial" font-size="20" fill="#701a75" text-anchor="middle">La Multiplication : Lignes et Colonnes</text>
  
  <!-- Grille 3x4 -->
  <g transform="translate(100, 80)">
    <!-- Ligne 1 -->
    <circle cx="30" cy="30" r="15" fill="#d946ef" />
    <circle cx="90" cy="30" r="15" fill="#d946ef" />
    <circle cx="150" cy="30" r="15" fill="#d946ef" />
    <circle cx="210" cy="30" r="15" fill="#d946ef" />
    <!-- Ligne 2 -->
    <circle cx="30" cy="90" r="15" fill="#d946ef" />
    <circle cx="90" cy="90" r="15" fill="#d946ef" />
    <circle cx="150" cy="90" r="15" fill="#d946ef" />
    <circle cx="210" cy="90" r="15" fill="#d946ef" />
    <!-- Ligne 3 -->
    <circle cx="30" cy="150" r="15" fill="#d946ef" />
    <circle cx="90" cy="150" r="15" fill="#d946ef" />
    <circle cx="150" cy="150" r="15" fill="#d946ef" />
    <circle cx="210" cy="150" r="15" fill="#d946ef" />
    
    <!-- Annotations -->
    <path d="M 10 30 L -10 30 L -10 150 L 10 150" fill="none" stroke="#701a75" stroke-width="2" />
    <text x="-20" y="95" font-family="Arial" font-size="16" fill="#701a75" text-anchor="end">3 lignes</text>
    
    <path d="M 30 10 L 30 -10 L 210 -10 L 210 10" fill="none" stroke="#701a75" stroke-width="2" />
    <text x="120" y="-20" font-family="Arial" font-size="16" fill="#701a75" text-anchor="middle">4 colonnes</text>
  </g>
  
  <text x="50%" y="270" font-family="Arial" font-size="22" font-weight="bold" fill="#86198f" text-anchor="middle">3 x 4 = 12</text>
</svg>
