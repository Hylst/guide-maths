<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cadran -->
  <circle cx="100" cy="100" r="80" fill="white" stroke="#1e293b" stroke-width="4"/>
  
  <!-- Chiffres -->
  <text x="100" y="40" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle">12</text>
  <text x="160" y="105" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle">3</text>
  <text x="100" y="170" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle">6</text>
  <text x="40" y="105" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle">9</text>
  
  <!-- Petite aiguille (Heures) - pointe vers 10 -->
  <line x1="100" y1="100" x2="70" y2="80" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Grande aiguille (Minutes) - pointe vers 2 (10 min) -->
  <line x1="100" y1="100" x2="130" y2="60" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Centre -->
  <circle cx="100" cy="100" r="4" fill="#1e293b"/>
  
  <text x="100" y="195" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Il est 10h10</text>
</svg>
