<svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Billet de 5 euros -->
  <rect x="10" y="10" width="80" height="45" rx="5" fill="#93c5fd" stroke="#1d4ed8" stroke-width="2"/>
  <text x="50" y="40" font-family="Arial" font-size="20" fill="#1d4ed8" text-anchor="middle" font-weight="bold">5€</text>
  
  <!-- Pièce de 2 euros -->
  <circle cx="130" cy="32" r="20" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <circle cx="130" cy="32" r="14" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="130" y="38" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">2€</text>
  
  <!-- Pièce de 1 euro -->
  <circle cx="185" cy="32" r="18" fill="#e5e7eb" stroke="#9ca3af" stroke-width="2"/>
  <circle cx="185" cy="32" r="12" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  <text x="185" y="38" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle" font-weight="bold">1€</text>

  <!-- Balance de cuisine -->
  <g transform="translate(50, 80)">
    <path d="M 0 50 L 100 50 L 80 0 L 20 0 Z" fill="#d1d5db" stroke="#4b5563" stroke-width="2"/>
    <circle cx="50" cy="25" r="20" fill="white" stroke="#4b5563" stroke-width="2"/>
    <line x1="50" y1="25" x2="65" y2="15" stroke="#ef4444" stroke-width="2"/>
    <text x="50" y="65" font-family="Arial" font-size="10" fill="#1e293b" text-anchor="middle">Balance (Masses)</text>
  </g>
</svg>
