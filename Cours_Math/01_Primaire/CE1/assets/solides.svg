<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Cube -->
  <g transform="translate(20, 20)">
    <rect x="10" y="20" width="50" height="50" fill="#f87171" stroke="#b91c1c" stroke-width="2"/>
    <path d="M 10 20 L 30 0 L 80 0 L 80 50 L 60 70" fill="none" stroke="#b91c1c" stroke-width="2"/>
    <line x1="60" y1="20" x2="80" y2="0" stroke="#b91c1c" stroke-width="2"/>
    <text x="45" y="90" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Cube</text>
  </g>
  
  <!-- Sphère -->
  <g transform="translate(150, 20)">
    <circle cx="50" cy="45" r="40" fill="#60a5fa" stroke="#1d4ed8" stroke-width="2"/>
    <ellipse cx="50" cy="45" rx="40" ry="15" fill="none" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4"/>
    <text x="50" y="105" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Sphère</text>
  </g>
  
  <!-- Cylindre -->
  <g transform="translate(280, 20)">
    <ellipse cx="50" cy="15" rx="30" ry="10" fill="#34d399" stroke="#059669" stroke-width="2"/>
    <line x1="20" y1="15" x2="20" y2="75" stroke="#059669" stroke-width="2"/>
    <line x1="80" y1="15" x2="80" y2="75" stroke="#059669" stroke-width="2"/>
    <path d="M 20 75 A 30 10 0 0 0 80 75" fill="none" stroke="#059669" stroke-width="2"/>
    <text x="50" y="105" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Cylindre</text>
  </g>
</svg>
