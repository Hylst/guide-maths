<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Centaine (Plaque de 100) -->
  <rect x="10" y="10" width="100" height="100" fill="#10b981" stroke="#047857" stroke-width="2"/>
  <g stroke="#047857" stroke-width="0.5">
    <line x1="20" y1="10" x2="20" y2="110"/>
    <line x1="30" y1="10" x2="30" y2="110"/>
    <line x1="40" y1="10" x2="40" y2="110"/>
    <line x1="50" y1="10" x2="50" y2="110"/>
    <line x1="60" y1="10" x2="60" y2="110"/>
    <line x1="70" y1="10" x2="70" y2="110"/>
    <line x1="80" y1="10" x2="80" y2="110"/>
    <line x1="90" y1="10" x2="90" y2="110"/>
    <line x1="100" y1="10" x2="100" y2="110"/>
    
    <line x1="10" y1="20" x2="110" y2="20"/>
    <line x1="10" y1="30" x2="110" y2="30"/>
    <line x1="10" y1="40" x2="110" y2="40"/>
    <line x1="10" y1="50" x2="110" y2="50"/>
    <line x1="10" y1="60" x2="110" y2="60"/>
    <line x1="10" y1="70" x2="110" y2="70"/>
    <line x1="10" y1="80" x2="110" y2="80"/>
    <line x1="10" y1="90" x2="110" y2="90"/>
    <line x1="10" y1="100" x2="110" y2="100"/>
  </g>
  <text x="60" y="130" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">1 Centaine (100)</text>

  <!-- Dizaine -->
  <rect x="130" y="10" width="15" height="100" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="137" y="130" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">1 Dizaine (10)</text>

  <!-- Unité -->
  <rect x="170" y="95" width="15" height="15" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <text x="177" y="130" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">1 Unité (1)</text>
</svg>
