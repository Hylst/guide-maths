<svg width="300" height="250" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Division posée 74 ÷ 3 -->
  <g transform="translate(50, 20)">
    <!-- Potence -->
    <line x1="60" y1="0" x2="60" y2="150" stroke="#1e293b" stroke-width="2"/>
    <line x1="60" y1="40" x2="120" y2="40" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Dividende et Diviseur -->
    <text x="50" y="30" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">7 4</text>
    <text x="70" y="30" font-family="Courier New" font-size="24" fill="#1e293b">3</text>
    
    <!-- Étape 1 : Dans 7 combien de fois 3 ? 2 fois -->
    <text x="70" y="70" font-family="Courier New" font-size="24" fill="#ef4444">2</text>
    <text x="130" y="70" font-family="Arial" font-size="12" fill="#ef4444">2 x 3 = 6</text>
    <text x="50" y="70" font-family="Courier New" font-size="24" fill="#ef4444" text-anchor="end">-6</text>
    <line x1="20" y1="80" x2="55" y2="80" stroke="#ef4444" stroke-width="1"/>
    <text x="50" y="110" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">1</text>
    
    <!-- Étape 2 : On abaisse le 4 -->
    <text x="60" y="110" font-family="Courier New" font-size="24" fill="#3b82f6" text-anchor="end">4</text>
    <path d="M 55 35 Q 65 70 55 100" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2" marker-end="url(#arrow)"/>
    
    <!-- Étape 3 : Dans 14 combien de fois 3 ? 4 fois -->
    <text x="95" y="70" font-family="Courier New" font-size="24" fill="#10b981">4</text>
    <text x="130" y="140" font-family="Arial" font-size="12" fill="#10b981">4 x 3 = 12</text>
    <text x="60" y="150" font-family="Courier New" font-size="24" fill="#10b981" text-anchor="end">-1 2</text>
    <line x1="20" y1="160" x2="65" y2="160" stroke="#10b981" stroke-width="1"/>
    <text x="60" y="190" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">2</text>
    
    <text x="150" y="220" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">74 = (3 x 24) + 2</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>
</svg>
