<svg width="250" height="220" viewBox="0 0 250 220" xmlns="http://www.w3.org/2000/svg">
  <!-- Multiplication posée 125 x 24 -->
  <g transform="translate(50, 20)">
    <text x="80" y="30" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">1 2 5</text>
    <text x="10" y="60" font-family="Courier New" font-size="24" fill="#1e293b">x</text>
    <text x="80" y="60" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">2 4</text>
    <line x1="0" y1="75" x2="100" y2="75" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Ligne 1 : 125 x 4 = 500 -->
    <text x="80" y="105" font-family="Courier New" font-size="24" fill="#ef4444" text-anchor="end">5 0 0</text>
    <text x="110" y="100" font-family="Arial" font-size="12" fill="#ef4444">125 x 4</text>
    
    <!-- Ligne 2 : 125 x 20 = 2500 -->
    <text x="80" y="135" font-family="Courier New" font-size="24" fill="#3b82f6" text-anchor="end">2 5 0 0</text>
    <circle cx="72" cy="128" r="8" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="2"/>
    <text x="110" y="130" font-family="Arial" font-size="12" fill="#3b82f6">125 x 20</text>
    
    <line x1="0" y1="145" x2="100" y2="145" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Résultat : 3000 -->
    <text x="80" y="175" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">3 0 0 0</text>
    
    <text x="50" y="200" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="bold">Total = 3 000</text>
  </g>
</svg>
