<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Périmètre (Le contour) -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="120" height="80" fill="none" stroke="#3b82f6" stroke-width="4" stroke-dasharray="8"/>
    <text x="60" y="-10" font-family="Arial" font-size="14" fill="#3b82f6" text-anchor="middle" font-weight="bold">PÉRIMÈTRE</text>
    <text x="60" y="110" font-family="Arial" font-size="12" fill="#3b82f6" text-anchor="middle">C'est le contour (le fil)</text>
    <!-- Flèches de contour -->
    <path d="M 0 0 L 120 0 L 120 80 L 0 80 Z" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  </g>
  
  <!-- Aire (La surface) -->
  <g transform="translate(240, 40)">
    <rect x="0" y="0" width="120" height="80" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="2"/>
    <!-- Quadrillage pour l'aire -->
    <line x1="30" y1="0" x2="30" y2="80" stroke="#10b981" stroke-width="0.5"/>
    <line x1="60" y1="0" x2="60" y2="80" stroke="#10b981" stroke-width="0.5"/>
    <line x1="90" y1="0" x2="90" y2="80" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="120" y2="40" stroke="#10b981" stroke-width="0.5"/>
    
    <text x="60" y="-10" font-family="Arial" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">AIRE</text>
    <text x="60" y="110" font-family="Arial" font-size="12" fill="#10b981" text-anchor="middle">C'est la surface (le tapis)</text>
  </g>
  
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="3" markerHeight="3" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>
</svg>
