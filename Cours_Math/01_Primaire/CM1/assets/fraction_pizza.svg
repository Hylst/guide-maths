<svg width="500" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fffbeb" />
  <text x="50%" y="40" font-family="Arial" font-size="20" fill="#b45309" text-anchor="middle">Comprendre les Fractions (La Pizza)</text>
  
  <g transform="translate(150, 160)">
    <!-- Pizza de base (8 parts) -->
    <circle cx="0" cy="0" r="100" fill="#fde68a" stroke="#d97706" stroke-width="4" />
    
    <!-- Parts mangées (3/8) -->
    <path d="M 0 0 L 100 0 A 100 100 0 0 1 -70.7 70.7 Z" fill="#f59e0b" stroke="#d97706" stroke-width="2" />
    
    <!-- Lignes de coupe -->
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#d97706" stroke-width="2" />
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#d97706" stroke-width="2" />
    <line x1="-70.7" y1="-70.7" x2="70.7" y2="70.7" stroke="#d97706" stroke-width="2" />
    <line x1="-70.7" y1="70.7" x2="70.7" y2="-70.7" stroke="#d97706" stroke-width="2" />
  </g>
  
  <!-- Explication Fraction -->
  <g transform="translate(350, 140)">
    <text x="0" y="0" font-family="Arial" font-size="40" font-weight="bold" fill="#d97706" text-anchor="middle">3</text>
    <line x1="-20" y1="10" x2="20" y2="10" stroke="#b45309" stroke-width="4" />
    <text x="0" y="45" font-family="Arial" font-size="40" font-weight="bold" fill="#b45309" text-anchor="middle">8</text>
    
    <text x="40" y="-5" font-family="Arial" font-size="14" fill="#d97706">Numérateur (parts prises)</text>
    <text x="40" y="40" font-family="Arial" font-size="14" fill="#b45309">Dénominateur (total)</text>
  </g>
</svg>
