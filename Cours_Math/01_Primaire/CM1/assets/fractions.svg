<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Un demi (1/2) -->
  <g transform="translate(50, 60)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#1e293b" stroke-width="2"/>
    <path d="M 0 -40 A 40 40 0 0 1 0 40 Z" fill="#ef4444" opacity="0.6"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#1e293b" stroke-width="1"/>
    <text x="0" y="70" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">1/2</text>
  </g>
  
  <!-- Un tiers (1/3) -->
  <g transform="translate(150, 60)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#1e293b" stroke-width="2"/>
    <path d="M 0 0 L 0 -40 A 40 40 0 0 1 34.6 20 Z" fill="#3b82f6" opacity="0.6"/>
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="0" x2="34.6" y2="20" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="0" x2="-34.6" y2="20" stroke="#1e293b" stroke-width="1"/>
    <text x="0" y="70" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">1/3</text>
  </g>
  
  <!-- Un quart (1/4) -->
  <g transform="translate(250, 60)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#1e293b" stroke-width="2"/>
    <path d="M 0 0 L 40 0 A 40 40 0 0 0 0 -40 Z" fill="#10b981" opacity="0.6"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#1e293b" stroke-width="1"/>
    <text x="0" y="70" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">1/4</text>
  </g>
  
  <!-- Trois quarts (3/4) -->
  <g transform="translate(350, 60)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#1e293b" stroke-width="2"/>
    <path d="M 0 0 L 0 -40 A 40 40 0 1 1 -40 0 Z" fill="#f59e0b" opacity="0.6"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#1e293b" stroke-width="1"/>
    <text x="0" y="70" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">3/4</text>
  </g>
</svg>
