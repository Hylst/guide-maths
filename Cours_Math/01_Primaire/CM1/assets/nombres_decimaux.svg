<svg width="500" height="150" viewBox="0 0 500 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Tableau de numération décimale -->
  <rect x="10" y="10" width="480" height="100" fill="none" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Ligne de séparation Virgule -->
  <line x1="250" y1="10" x2="250" y2="110" stroke="#ef4444" stroke-width="4"/>
  
  <!-- Lignes verticales secondaires -->
  <line x1="130" y1="40" x2="130" y2="110" stroke="#1e293b" stroke-width="1"/>
  <line x1="370" y1="40" x2="370" y2="110" stroke="#1e293b" stroke-width="1"/>
  
  <!-- En-têtes -->
  <text x="130" y="30" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">Partie ENTIÈRE</text>
  <text x="370" y="30" font-family="Arial" font-size="16" fill="#ef4444" text-anchor="middle" font-weight="bold">Partie DÉCIMALE</text>
  
  <text x="70" y="60" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Dizaines</text>
  <text x="190" y="60" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Unités</text>
  <text x="310" y="60" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle">Dixièmes</text>
  <text x="430" y="60" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle">Centièmes</text>
  
  <!-- Exemple : 12,45 -->
  <text x="70" y="95" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="middle">1</text>
  <text x="190" y="95" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="middle">2</text>
  <text x="250" y="105" font-family="Arial" font-size="40" fill="#ef4444" text-anchor="middle">,</text>
  <text x="310" y="95" font-family="Courier New" font-size="24" fill="#ef4444" text-anchor="middle">4</text>
  <text x="430" y="95" font-family="Courier New" font-size="24" fill="#ef4444" text-anchor="middle">5</text>
  
  <text x="250" y="140" font-family="Arial" font-size="14" fill="#1e293b" text-anchor="middle">Douze virgule quarante-cinq</text>
</svg>
