<svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Droites parallèles -->
  <g transform="translate(20, 20)">
    <line x1="0" y1="20" x2="100" y2="20" stroke="#3b82f6" stroke-width="2"/>
    <line x1="0" y1="50" x2="100" y2="50" stroke="#3b82f6" stroke-width="2"/>
    <text x="50" y="80" font-family="Arial" font-size="12" fill="#3b82f6" text-anchor="middle">Parallèles</text>
  </g>
  
  <!-- Droites perpendiculaires -->
  <g transform="translate(180, 20)">
    <line x1="0" y1="50" x2="100" y2="50" stroke="#ef4444" stroke-width="2"/>
    <line x1="50" y1="0" x2="50" y2="100" stroke="#ef4444" stroke-width="2"/>
    <!-- Petit carré d'angle droit -->
    <rect x="50" y="40" width="10" height="10" fill="none" stroke="#ef4444" stroke-width="1"/>
    <text x="50" y="120" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle">Perpendiculaires</text>
  </g>
</svg>
