<svg width="600" height="250" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#f0fdfa" />
  <text x="50%" y="40" font-family="Arial" font-size="20" fill="#0f766e" text-anchor="middle">Les Nombres Décimaux sur la Droite</text>
  
  <!-- Droite principale -->
  <line x1="50" y1="120" x2="550" y2="120" stroke="#0f766e" stroke-width="3" />
  
  <!-- Graduations Unités -->
  <line x1="50" y1="110" x2="50" y2="130" stroke="#0f766e" stroke-width="3" />
  <text x="50" y="150" font-family="Arial" font-size="18" font-weight="bold" fill="#0f766e" text-anchor="middle">0</text>
  
  <line x1="550" y1="110" x2="550" y2="130" stroke="#0f766e" stroke-width="3" />
  <text x="550" y="150" font-family="Arial" font-size="18" font-weight="bold" fill="#0f766e" text-anchor="middle">1</text>
  
  <!-- Graduations Dixièmes -->
  <g stroke="#14b8a6" stroke-width="2">
    <line x1="100" y1="115" x2="100" y2="125" />
    <line x1="150" y1="115" x2="150" y2="125" />
    <line x1="200" y1="115" x2="200" y2="125" />
    <line x1="250" y1="115" x2="250" y2="125" />
    <line x1="300" y1="110" x2="300" y2="130" stroke-width="3" stroke="#0d9488" /> <!-- 0.5 -->
    <line x1="350" y1="115" x2="350" y2="125" />
    <line x1="400" y1="115" x2="400" y2="125" />
    <line x1="450" y1="115" x2="450" y2="125" />
    <line x1="500" y1="115" x2="500" y2="125" />
  </g>
  
  <!-- Textes Dixièmes -->
  <text x="300" y="150" font-family="Arial" font-size="16" fill="#0d9488" text-anchor="middle">0,5</text>
  <text x="150" y="150" font-family="Arial" font-size="14" fill="#14b8a6" text-anchor="middle">0,2</text>
  <text x="450" y="150" font-family="Arial" font-size="14" fill="#14b8a6" text-anchor="middle">0,8</text>
  
  <!-- Zoom sur un point -->
  <circle cx="350" cy="120" r="6" fill="#ef4444" />
  <path d="M 350 110 L 350 70" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" />
  <rect x="310" y="40" width="80" height="30" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="2" />
  <text x="350" y="60" font-family="Arial" font-size="16" font-weight="bold" fill="#b91c1c" text-anchor="middle">0,6</text>
  
  <text x="350" y="200" font-family="Arial" font-size="14" fill="#0f766e" text-anchor="middle">6 dixièmes = 6 parts sur 10</text>
</svg>
