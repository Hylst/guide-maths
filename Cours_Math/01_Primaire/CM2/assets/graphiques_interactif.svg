<svg width="500" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#fafaf9" />
  <text x="50%" y="40" font-family="Arial" font-size="20" fill="#44403c" text-anchor="middle">Du Tableau au Graphique (Interactif)</text>
  <!-- Axes -->
  <line x1="80" y1="250" x2="450" y2="250" stroke="#44403c" stroke-width="2" />
  <line x1="80" y1="250" x2="80" y2="80" stroke="#44403c" stroke-width="2" />
  <!-- Bâtons -->
  <rect x="120" y="150" width="40" height="100" fill="#f59e0b" />
  <rect x="220" y="100" width="40" height="150" fill="#10b981" />
  <rect x="320" y="200" width="40" height="50" fill="#3b82f6" />
  <!-- Légende -->
  <text x="140" y="270" font-family="Arial" font-size="12" fill="#44403c" text-anchor="middle">Lun</text>
  <text x="240" y="270" font-family="Arial" font-size="12" fill="#44403c" text-anchor="middle">Mar</text>
  <text x="340" y="270" font-family="Arial" font-size="12" fill="#44403c" text-anchor="middle">Mer</text>
</svg>
