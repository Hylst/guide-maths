<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Contenance (Bouteille 1L) -->
  <g transform="translate(20, 20)">
    <path d="M 30 0 L 50 0 L 50 20 L 70 30 L 70 100 L 10 100 L 10 30 L 30 20 Z" fill="#93c5fd" stroke="#1d4ed8" stroke-width="2"/>
    <line x1="10" y1="80" x2="70" y2="80" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="2"/>
    <text x="40" y="60" font-family="Arial" font-size="14" fill="#1d4ed8" text-anchor="middle" font-weight="bold">1 L</text>
    <text x="40" y="120" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Contenance</text>
  </g>
  
  <!-- Périmètre (Rectangle) -->
  <g transform="translate(180, 20)">
    <rect x="10" y="20" width="120" height="60" fill="none" stroke="#10b981" stroke-width="3"/>
    <text x="70" y="15" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">6 cm</text>
    <text x="70" y="95" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">6 cm</text>
    <text x="-5" y="55" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle" transform="rotate(-90, -5, 55)">3 cm</text>
    <text x="145" y="55" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle" transform="rotate(90, 145, 55)">3 cm</text>
    
    <text x="70" y="120" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Périmètre = 6+3+6+3 = 18 cm</text>
  </g>
</svg>
