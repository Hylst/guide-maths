<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Droite numérique -->
  <line x1="20" y1="50" x2="280" y2="50" stroke="#1e293b" stroke-width="2"/>
  <line x1="20" y1="45" x2="20" y2="55" stroke="#1e293b" stroke-width="2"/>
  <line x1="280" y1="45" x2="280" y2="55" stroke="#1e293b" stroke-width="2"/>
  <line x1="150" y1="45" x2="150" y2="55" stroke="#1e293b" stroke-width="1"/>
  
  <text x="20" y="75" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">4 000</text>
  <text x="280" y="75" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">5 000</text>
  <text x="150" y="75" font-family="Arial" font-size="10" fill="#94a3b8" text-anchor="middle">4 500</text>
  
  <!-- Point 4 812 -->
  <circle cx="230" cy="50" r="5" fill="#ef4444"/>
  <text x="230" y="35" font-family="Arial" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">4 812</text>
  
  <!-- Flèche vers 5000 -->
  <path d="M 235 45 Q 255 30 275 45" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>
  </defs>
  
  <text x="200" y="20" font-family="Arial" font-size="10" fill="#10b981" text-anchor="middle">Proche de 5 000</text>
</svg>
