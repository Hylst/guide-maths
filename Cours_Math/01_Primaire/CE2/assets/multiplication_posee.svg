<svg width="250" height="200" viewBox="0 0 250 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Multiplication posée 42 x 3 -->
  <g transform="translate(50, 20)">
    <text x="60" y="30" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">4 2</text>
    <text x="10" y="60" font-family="Courier New" font-size="24" fill="#1e293b">x</text>
    <text x="60" y="60" font-family="Courier New" font-size="24" fill="#1e293b" text-anchor="end">3</text>
    <line x1="0" y1="75" x2="80" y2="75" stroke="#1e293b" stroke-width="2"/>
    
    <!-- Étape 1 : 3 x 2 = 6 -->
    <text x="60" y="105" font-family="Courier New" font-size="24" fill="#ef4444" text-anchor="end">6</text>
    <text x="100" y="100" font-family="Arial" font-size="12" fill="#ef4444">3 x 2 = 6</text>
    
    <!-- Étape 2 : 3 x 4 = 12 -->
    <text x="40" y="105" font-family="Courier New" font-size="24" fill="#3b82f6" text-anchor="end">1 2</text>
    <text x="100" y="130" font-family="Arial" font-size="12" fill="#3b82f6">3 x 4 = 12</text>
    
    <text x="40" y="160" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">126</text>
  </g>
</svg>
