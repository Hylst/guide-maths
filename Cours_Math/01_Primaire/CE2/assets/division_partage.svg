<svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Partage de 12 billes en 3 groupes -->
  <g transform="translate(20, 20)">
    <!-- Groupe 1 -->
    <rect x="0" y="0" width="80" height="80" rx="10" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4"/>
    <circle cx="20" cy="20" r="8" fill="#3b82f6"/>
    <circle cx="50" cy="25" r="8" fill="#3b82f6"/>
    <circle cx="30" cy="55" r="8" fill="#3b82f6"/>
    <circle cx="60" cy="50" r="8" fill="#3b82f6"/>
    
    <!-- Groupe 2 -->
    <rect x="100" y="0" width="80" height="80" rx="10" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="4"/>
    <circle cx="120" cy="20" r="8" fill="#10b981"/>
    <circle cx="150" cy="25" r="8" fill="#10b981"/>
    <circle cx="130" cy="55" r="8" fill="#10b981"/>
    <circle cx="160" cy="50" r="8" fill="#10b981"/>
    
    <!-- Groupe 3 -->
    <rect x="200" y="0" width="80" height="80" rx="10" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4"/>
    <circle cx="220" cy="20" r="8" fill="#f59e0b"/>
    <circle cx="250" cy="25" r="8" fill="#f59e0b"/>
    <circle cx="230" cy="55" r="8" fill="#f59e0b"/>
    <circle cx="260" cy="50" r="8" fill="#f59e0b"/>
    
    <text x="140" y="110" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle" font-weight="bold">12 ÷ 3 = 4</text>
    <text x="140" y="130" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">12 billes partagées en 3 groupes de 4</text>
  </g>
</svg>
