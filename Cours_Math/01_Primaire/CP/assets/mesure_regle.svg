  <line x1="56" y1="80" x2="56" y2="90" stroke="#ca8a04" stroke-width="1"/>
  <line x1="92" y1="80" x2="92" y2="90" stroke="#ca8a04" stroke-width="1"/>
  <line x1="128" y1="80" x2="128" y2="90" stroke="#ca8a04" stroke-width="1"/>
  <line x1="164" y1="80" x2="164" y2="90" stroke="#ca8a04" stroke-width="1"/>
  
