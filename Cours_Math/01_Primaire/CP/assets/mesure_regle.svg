  <polygon points="272,40 290,47.5 272,55" fill="#fde68a" stroke="#c2410c" stroke-width="1"/>
  <path d="M 285 45 L 290 47.5 L 285 50 Z" fill="#1e293b"/>
  
  <text x="20" y="30" font-family="Arial" font-size="12" fill="#1e293b">On aligne le début sur le 0 !</text>
