    <circle cx="262" cy="90" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
    
    <text x="55" y="130" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">3</text>
    <text x="167" y="130" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">2</text>
    <text x="262" y="130" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">5</text>
