    <circle cx="55" cy="20" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
    <circle cx="90" cy="20" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
    
    <text x="115" y="25" font-family="Arial" font-size="24" fill="#1e293b">+</text>
    
    <circle cx="150" cy="20" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
    <circle cx="185" cy="20" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
    
    <text x="210" y="25" font-family="Arial" font-size="24" fill="#1e293b">=</text>
    
    <circle cx="245" cy="20" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
    <circle cx="280" cy="20" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
    <circle cx="245" cy="55" r="15" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
