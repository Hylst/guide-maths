<svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Soustraction: 5 - 2 = 3 -->
  <g transform="translate(10, 10)">
    <!-- 5 ballons au départ -->
    <circle cx="20" cy="30" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2"/>
    <circle cx="55" cy="30" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2"/>
    <circle cx="90" cy="30" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2"/>
    <circle cx="37" cy="65" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2" opacity="0.3"/>
    <circle cx="72" cy="65" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2" opacity="0.3"/>
    
    <!-- Croix sur les ballons enlevés -->
    <line x1="27" y1="55" x2="47" y2="75" stroke="#ef4444" stroke-width="3"/>
    <line x1="47" y1="55" x2="27" y2="75" stroke="#ef4444" stroke-width="3"/>
    
    <line x1="62" y1="55" x2="82" y2="75" stroke="#ef4444" stroke-width="3"/>
    <line x1="82" y1="55" x2="62" y2="75" stroke="#ef4444" stroke-width="3"/>

    <text x="120" y="55" font-family="Arial" font-size="24" fill="#1e293b">-</text>
    <text x="150" y="55" font-family="Arial" font-size="24" fill="#1e293b">2</text>
    <text x="185" y="55" font-family="Arial" font-size="24" fill="#1e293b">=</text>
    
    <!-- Résultat -->
    <circle cx="230" cy="30" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2"/>
    <circle cx="265" cy="30" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2"/>
    <circle cx="247" cy="65" r="15" fill="#818cf8" stroke="#4338ca" stroke-width="2"/>
    
    <text x="55" y="130" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">5 - 2</text>
    <text x="247" y="130" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">3</text>
  </g>
</svg>
