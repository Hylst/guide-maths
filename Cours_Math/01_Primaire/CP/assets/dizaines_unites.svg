<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Dizaine (Barre de 10) -->
  <rect x="20" y="20" width="20" height="100" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <line x1="20" y1="30" x2="40" y2="30" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="40" x2="40" y2="40" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="50" x2="40" y2="50" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="60" x2="40" y2="60" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="70" x2="40" y2="70" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="80" x2="40" y2="80" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="90" x2="40" y2="90" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="100" x2="40" y2="100" stroke="#1d4ed8" stroke-width="1"/>
  <line x1="20" y1="110" x2="40" y2="110" stroke="#1d4ed8" stroke-width="1"/>
  
  <!-- Unités (Cubes isolés) -->
  <rect x="60" y="100" width="20" height="20" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <rect x="90" y="100" width="20" height="20" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <rect x="120" y="100" width="20" height="20" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  
  <text x="20" y="140" font-family="Arial" font-size="12" fill="#1e293b">1 Dizaine</text>
  <text x="75" y="140" font-family="Arial" font-size="12" fill="#1e293b">3 Unités</text>
</svg>
