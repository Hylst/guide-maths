<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Carré -->
  <rect x="20" y="20" width="60" height="60" fill="#f87171" stroke="#b91c1c" stroke-width="2"/>
  <text x="50" y="105" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Carré</text>
  
  <!-- Rectangle -->
  <rect x="110" y="30" width="100" height="50" fill="#60a5fa" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160" y="105" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Rectangle</text>
  
  <!-- Triangle -->
  <polygon points="260,80 320,80 290,20" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <text x="290" y="105" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Triangle</text>
  
  <!-- Cercle -->
  <circle cx="365" cy="50" r="35" fill="#34d399" stroke="#059669" stroke-width="2"/>
  <text x="365" y="105" font-family="Arial" font-size="12" fill="#1e293b" text-anchor="middle">Cercle</text>
